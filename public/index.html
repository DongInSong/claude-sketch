<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>claude-sketch</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ctext y='26' font-size='28' fill='%23C15F3C'%3E%E2%9C%B3%3C/text%3E%3C/svg%3E">
<style>
  /* Both handwriting faces are bundled — no webfont CDN, so nothing leaves the
     machine and it works offline. Excalifont carries no Hangul, so Gaegu covers
     that block: subset to the 2,350 syllables Gaegu actually draws (76kB, the
     same coverage Google Fonts serves) and pinned to the Hangul range so it
     never steals the Latin text from Excalifont. */
  @font-face{
    font-family:"Excalifont";
    src:url("/fonts/Excalifont-Regular.woff2") format("woff2");
    font-weight:400 800;      /* single weight; bold is synthesised, which reads as thicker crayon */
    font-display:swap;
  }
  @font-face{
    font-family:"Gaegu";
    src:url("/fonts/Gaegu-Hangul.woff2") format("woff2");
    font-weight:400 800;
    font-display:swap;
    unicode-range:U+1100-11FF, U+3130-318F, U+AC00-D7A3;
  }
  /* Japanese and Chinese are the expensive ones — every ideograph is its own
     drawing. These two carry the UI's own wording only (~250 characters each,
     50/95kB); anything you typed yourself falls back to the system face. Both
     cover U+4E00-9FFF, so they are kept apart by :lang rather than by order. */
  @font-face{
    font-family:"KleeUI";
    src:url("/fonts/KleeOne-UI.woff2") format("woff2");
    font-weight:400 800;
    font-display:swap;
    unicode-range:U+3000-303F, U+3040-30FF, U+31F0-31FF, U+4E00-9FFF, U+FF01-FF60;
  }
  @font-face{
    font-family:"MaShanUI";
    src:url("/fonts/MaShanZheng-UI.woff2") format("woff2");
    font-weight:400 800;
    font-display:swap;
    unicode-range:U+3000-303F, U+4E00-9FFF, U+FF01-FF60;
  }
</style>
<style>
  :root{
    /* the one place to change the handwriting face */
    --hand:"Excalifont","Gaegu","Segoe Print","Comic Sans MS","Chalkboard SE","Marker Felt","Apple SD Gothic Neo","Malgun Gothic",cursive;
    color-scheme: light;
    --paper:#FAF6EC; --paper2:#F1EBDB; --grain:rgba(60,50,30,.05);
    --ink:#3A3428; --ink2:#6E6553; --ink3:#A29781;
    --accent:#C15F3C; --heat:#C1553C;
    --op-read:#2a78d6; --op-grep:#4a3aa7; --op-edit:#1baf7a; --op-bash:#eda100;
    --good:#1a7f37; --warn:#9a6700; --bad:#c62f2e;
    --gold1:#9A6910; --gold2:#D2A02C; --gold3:#6E4708;
  }
  /* applyLang() stamps the language on <html>, which is what keeps the two
     ideograph faces from fighting over the characters they share. Not anchored
     to <html>, so a single element declaring its own language — the 日本語
     button sitting in the Chinese UI — is drawn with the right face too. */
  /* font-family is restated here on purpose: the value is inherited already
     substituted, so redefining --hand alone would change nothing on a button. */
  [lang="ja"]{ --hand:"Excalifont","Gaegu","KleeUI","Segoe Print","Comic Sans MS","Chalkboard SE","Marker Felt","Yu Gothic","Hiragino Sans",cursive;
    font-family:var(--hand); }
  [lang="zh"]{ --hand:"Excalifont","Gaegu","MaShanUI","Segoe Print","Comic Sans MS","Chalkboard SE","Marker Felt","Microsoft YaHei","PingFang SC",cursive;
    font-family:var(--hand); }
  /* Keyed on the attribute rather than on the media query, so there is one dark
     palette and not a copy of it per way of arriving at dark. The attribute is
     stamped in <head> before anything paints — the page is drawn by script from
     end to end, so there is no version of it that runs without one. */
  :root[data-theme="dark"]{
    color-scheme: dark;
    --paper:#2A2A26; --paper2:#232320; --grain:rgba(240,235,215,.04);
    --ink:#EDE8DA; --ink2:#B5AE9C; --ink3:#7E7867;
    --accent:#E08B6D; --heat:#E08B6D;
    --op-read:#3987e5; --op-grep:#9085e9; --op-edit:#199e70; --op-bash:#c98500;
    --good:#4cae66; --warn:#d9a53e; --bad:#e66767;
    --gold1:#E8C071; --gold2:#FFE9A8; --gold3:#C79236;
  }

  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    background:var(--paper);
    background-image:radial-gradient(var(--grain) 1px, transparent 1.4px);
    background-size:6px 6px;
    color:var(--ink);
    font:20px/1.5 var(--hand);
  }
  .sheet{max-width:880px;margin:0 auto;padding:30px 22px 50px}
  button{font:inherit;color:inherit;background:none;border:none;cursor:pointer;padding:0}
  button:focus-visible{outline:2px solid var(--accent);outline-offset:3px;border-radius:8px}
  ::selection{background:color-mix(in srgb, var(--accent) 25%, transparent)}

  /* The bar down the side was the one piece of chrome still drawn by the
     operating system, sitting against the paper in whatever grey it liked.
     Both spellings, and they are not additive: where a browser understands
     scrollbar-color it uses it and ignores ::-webkit-scrollbar entirely —
     measured here, the gutter comes out at thin's 10px rather than the 12px the
     webkit block asks for. So the standard pair is what Chrome and Firefox
     render, and the webkit block is there for Safari, which has only the old
     one. Colours are palette variables either way, so the bar follows the theme
     without anything having to tell it to.
     No squiggle filter: it does not apply to scrollbar parts, and a pencil line
     that stayed still while everything else boiled would look broken rather
     than hand-drawn. A soft pencil stub is the closest honest thing. */
  html{scrollbar-color: color-mix(in srgb, var(--ink3) 62%, transparent) transparent;
    scrollbar-width:thin}
  /* The crayon needs the old spelling — the standard pair can set two colours and
     a width, and a crayon is a texture. So where ::-webkit-scrollbar is
     understood the standard pair is handed back to auto, which is what lets the
     rules below take effect at all; Firefox fails this test and keeps the plain
     tinted bar above, which is the best it can be given. */
  @supports selector(::-webkit-scrollbar){
    html{scrollbar-color:auto;scrollbar-width:auto}
    ::-webkit-scrollbar{width:13px;height:13px;background:transparent}
    ::-webkit-scrollbar-track{background:transparent}
    /* the same stroke the footprints are filled with, laid down the bar: two
       passes of one colour at different pressures, at the angle a right hand
       drags. Waxy rather than flat, which is the whole difference between a
       crayon and a rule. */
    ::-webkit-scrollbar-thumb{
      border:3px solid transparent;background-clip:content-box;
      border-radius:9px 7px 10px 8px / 8px 10px 7px 9px;
      background-image:repeating-linear-gradient(115deg,
        color-mix(in srgb, var(--ink3) 85%, transparent) 0 2px,
        color-mix(in srgb, var(--ink3) 40%, transparent) 2px 4.5px)}
    ::-webkit-scrollbar-thumb:hover{
      background-image:repeating-linear-gradient(115deg,
        color-mix(in srgb, var(--ink2) 88%, transparent) 0 2px,
        color-mix(in srgb, var(--ink2) 45%, transparent) 2px 4.5px)}
    ::-webkit-scrollbar-thumb:active{
      background-image:repeating-linear-gradient(115deg,
        color-mix(in srgb, var(--accent) 92%, transparent) 0 2px,
        color-mix(in srgb, var(--accent) 48%, transparent) 2px 4.5px)}
    ::-webkit-scrollbar-corner{background:transparent}
  }

  .hline{height:2.5px;background:var(--ink3);border-radius:99px;opacity:.5;margin:24px 0;filter:url(#squiggle)}

  header{display:flex;align-items:flex-start;gap:12px}
  h1{font-size:32px;margin:0;letter-spacing:.01em;position:relative}
  /* what the mark just did, shouted over its own head and gone again. Absolute,
     so a long word in any language cannot shove the title along. */
  /* Above the mark, in the sheet's own top margin — the only clear space next to
     it, since the title runs off to the right. It springs upward, so it is set
     low enough that the top of the spring still clears the top of the page. */
  .sparksay{position:absolute;left:-5px;top:-13px;z-index:6;pointer-events:none;
    transform-origin:20% 100%;
    font-size:14.5px;font-weight:700;line-height:1.2;white-space:nowrap;
    color:var(--accent);background:var(--paper);padding:1px 8px;opacity:0;
    border-radius:10px 14px 11px 15px / 14px 11px 15px 10px;
    box-shadow:0 0 0 1.7px color-mix(in srgb, var(--accent) 42%, transparent)}
  /* The spring belongs to the arrival only. Left to run the whole way it drags
     the opacity down with it and the word is gone in half a second, before it
     can be read — so it is held up until the end and the easing is per step. */
  .sparksay.say{animation:sparksay 1.7s forwards}
  @keyframes sparksay{
    0%{opacity:0;transform:translateY(8px) scale(.5) rotate(-16deg);
      animation-timing-function:cubic-bezier(.2,1.5,.4,1)}
    18%{opacity:1;transform:translateY(-4px) scale(1.14) rotate(7deg);
      animation-timing-function:ease-out}
    32%{opacity:1;transform:translateY(0) scale(1) rotate(-5deg)}
    44%{opacity:1;transform:translateY(-2px) scale(1.04) rotate(-1deg)}
    58%{opacity:1;transform:translateY(0) scale(1) rotate(-4deg)}
    74%{opacity:1;transform:translateY(0) scale(1) rotate(-4deg);
      animation-timing-function:ease-in}
    100%{opacity:0;transform:translateY(-9px) scale(.97) rotate(-4deg)}
  }
  @keyframes sparksayQuiet{0%,84%{opacity:1}100%{opacity:0}}
  @media (prefers-reduced-motion: reduce){
    .sparksay.say{animation:sparksayQuiet 1.7s linear forwards}
  }
  /* the mark is the switch: it already sits where a theme control would go, and
     it is the one thing on the page that is drawn in ink rather than written */
  h1 .spark{color:var(--accent);display:inline-block;transform:rotate(-8deg);
    font:inherit;line-height:1;vertical-align:baseline;
    transition:transform .25s ease, color .25s ease}
  h1 button.spark:hover{color:var(--heat);transform:rotate(-8deg) scale(1.14)}
  h1 button.spark:active{transform:rotate(-26deg) scale(1.02)}
  @media (prefers-reduced-motion: reduce){
    h1 .spark{transition:none}
    h1 button.spark:hover,h1 button.spark:active{transform:rotate(-8deg)}
  }
  h1 .lt{color:var(--accent)}
  .tag{margin:0;color:var(--ink3);font-size:15px}
  .topctl{margin-left:auto;display:flex;gap:14px;align-items:center;padding-top:6px}
  .topctl button{color:var(--ink2);text-decoration:underline wavy 1.2px;text-underline-offset:4px;font-size:17px}
  .topctl button:hover{color:var(--ink)}
  .topctl button.on{color:var(--accent)}

  .sessline{margin:20px 0 0;font-size:17px;color:var(--ink2);display:flex;flex-wrap:wrap;gap:6px 12px;align-items:center}
  /* sessions belong under the folder, not beside it: the folder says where you
     are looking, the list says which run — one is a heading for the other */
  /* min-height so the row keeps its space whatever it is saying — an empty
     list swapping for a message used to move everything below it */
  #sessLinks{flex:1 0 100%;display:flex;flex-wrap:wrap;align-items:center;gap:4px 12px;
    margin-top:3px;min-height:28px}
  #sessLinks.stale .slink{opacity:.45}      /* what you are looking at is a last-known state */
  .sessline b{color:var(--ink);font-size:15px}
  /* the watched folder: a pinned scrap you can swap */
  .folder{position:relative;color:var(--ink);font-size:15px;padding:2px 10px;white-space:nowrap}
  .folder::before{content:"";position:absolute;inset:-2px -4px;
    border:2px solid var(--ink3);
    border-radius:235px 18px 245px 20px / 20px 245px 18px 235px;
    filter:url(#squiggle);opacity:.55}
  .folder:hover{color:var(--accent)}
  .folder:hover::before{border-color:var(--accent);opacity:.9}
  .folder .caret{color:var(--ink3);font-size:12px;margin-left:5px}
  .picker{position:fixed;z-index:30;display:none;max-width:min(520px, 94vw);max-height:70vh;
    overflow-y:auto;background:var(--paper);border:2.5px solid var(--ink2);
    border-radius:14px 18px 15px 19px / 18px 15px 19px 14px;
    padding:10px 8px 8px;box-shadow:3px 4px 0 color-mix(in srgb, var(--ink) 14%, transparent)}
  .picker.show{display:block}
  .picker .ptitle{font-size:14px;color:var(--ink3);padding:0 8px 6px}
  .picker button{display:block;width:100%;text-align:left;padding:5px 9px;border-radius:9px;
    font-size:15px;line-height:1.35;color:var(--ink)}
  .picker button:hover{background:color-mix(in srgb, var(--ink) 6%, transparent)}
  .picker button.on{position:relative;color:var(--accent);font-weight:700}
  .picker button.on::before{content:"";position:absolute;inset:1px 2px;
    border:2px solid var(--accent);
    border-radius:225px 20px 255px 20px / 20px 255px 20px 225px;
    filter:url(#squiggle)}
  .picker .meta{display:block;font-size:12.5px;color:var(--ink3);font-variant-numeric:tabular-nums}
  .picker button.gone{opacity:.5}
  .picker button.gone .meta::after{content:" ✕";color:var(--bad)}
  .slink{color:var(--ink2);position:relative;padding:1px 8px;white-space:nowrap;font-size:17px}
  .slink:hover{color:var(--ink)}
  .slink.on{color:var(--ink);font-weight:700}
  .slink.on::before{
    content:"";position:absolute;inset:-2px -3px;
    border:2px solid var(--accent);
    border-radius:225px 20px 255px 20px / 20px 255px 20px 225px;
    filter:url(#squiggle);
  }
  .slink .st{font-size:12.5px;color:var(--ink3)}
  .slink.on .st{color:var(--accent)}
  .slink.on.live .st{color:var(--good)}
  .slink.live{color:var(--ink);font-weight:700}
  .slink.live .st{color:var(--good);font-weight:700}
  .slink.live .st::before{content:"●";margin-right:3px;animation:beat 1.6s infinite}
  @keyframes beat{0%,100%{opacity:1}50%{opacity:.25}}
  @media (prefers-reduced-motion: reduce){ .slink.live .st::before{animation:none} }
  .slink.fresh{color:var(--ink2)}
  .slink.old{opacity:.5}
  .slink.more{color:var(--accent);text-decoration:underline wavy 1.5px;text-underline-offset:4px}
  .empty{color:var(--ink3);font-size:16px}

  .agents{margin:16px 0 0;font-size:17.5px}
  .agents .al{white-space:normal}
  .agents .nw{white-space:nowrap}
  .agents .agl{display:block;width:100%;text-align:left;padding:2px 8px;position:relative;
    border-radius:8px;line-height:1.5}
  .agents .agl:hover{background:color-mix(in srgb, var(--ink) 5%, transparent)}
  .agents .agl.off{opacity:.42}
  .agents .agl.on::before{content:"";position:absolute;inset:-1px -2px;
    border:2.2px solid var(--accent);
    border-radius:225px 20px 255px 20px / 20px 255px 20px 225px;filter:url(#squiggle)}
  .agents .aghint{font-size:13.5px;color:var(--ink3);padding:2px 8px}
  .agents .fold{color:var(--ink3);font-size:14.5px;padding:1px 8px;border-radius:8px;
    text-decoration:underline wavy 1.3px;text-underline-offset:4px}
  .agents .fold:hover{color:var(--ink);background:color-mix(in srgb, var(--ink) 5%, transparent)}
  .agents .brief{display:block;font-size:14px;color:var(--ink3);padding:0 8px 2px 34px;line-height:1.4}
  .agents .brief.main{padding-left:22px}
  .agents .brief .q{color:var(--ink2)}
  .agents .brief .run{color:var(--good);font-weight:700}
  .agents .brief .dur{color:var(--ink2);font-variant-numeric:tabular-nums}
  .openable{cursor:pointer}
  .openable:hover .fn, .openable:hover{text-decoration-color:var(--accent)}
  .mc.openable:hover{outline:2.5px solid var(--accent);outline-offset:2px}
  #tm.openable{cursor:pointer}
  .nofiles{font-size:15px;color:var(--ink3);margin:6px 0 0}
  .nofiles b{color:var(--ink2)}
  .agents .dot{color:var(--accent);font-weight:700}
  .agents .sub{color:var(--ink3)}
  /* the short code the live arrows wear, next to the name it stands for */
  .agents .code{color:var(--ink3);font-size:13.5px;border:1.5px solid var(--ink3);
    border-radius:7px 9px 8px 10px;padding:0 5px;opacity:.75}
  /* model tiers: Fable on top, then Opus, Sonnet, Haiku */
  .mdl{font-size:15px;color:var(--ink3);white-space:nowrap}
  .mdl .tier{margin-right:3px}
  .mdl.m-fable{
    font-weight:700;letter-spacing:.02em;
    background:linear-gradient(100deg, var(--gold3) 0%, var(--gold1) 28%,
      var(--gold2) 46%, var(--gold1) 64%, var(--gold3) 100%);
    background-size:280% 100%;
    -webkit-background-clip:text;background-clip:text;
    -webkit-text-fill-color:transparent;color:transparent;
    animation:shimmer 4.5s ease-in-out infinite;
  }
  .mdl.m-fable .tier{-webkit-text-fill-color:var(--gold1);color:var(--gold1);
    text-shadow:0 0 9px color-mix(in srgb, var(--gold2) 50%, transparent)}
  @keyframes shimmer{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}
  .mdl.m-opus{color:var(--accent);font-weight:700;
    text-decoration:underline wavy 1.6px;text-underline-offset:4px}
  .mdl.m-sonnet{color:var(--ink2);font-weight:600;
    text-decoration:underline dotted 1.4px;text-underline-offset:4px}
  .mdl.m-haiku{color:var(--ink3);font-size:14px;font-style:italic}
  @media (prefers-reduced-motion: reduce){ .mdl.m-fable{animation:none} }
  .agents .tk{color:var(--ink2);font-size:15px;font-variant-numeric:tabular-nums}

  .statline{margin:8px 0 0;color:var(--ink2);font-size:17px;font-variant-numeric:tabular-nums}
  .statline b{color:var(--ink)}
  .statline .alert{color:var(--bad);font-weight:700}
  .costline{font-size:15px;margin-top:3px;color:var(--ink3)}
  .costline .hint2{color:var(--ink3);font-size:13.5px}
  .frow .mk .er{color:var(--bad);font-weight:700}
  .mc.err{box-shadow:inset 0 0 0 2px var(--bad)}

  /* section headers: tiny, and foldable */
  section h2{font-size:20px;margin:0 0 2px;cursor:pointer;user-select:none;display:inline-block}
  section h2::before{content:"▾ ";color:var(--ink3);font-size:15px}
  section.folded h2::before{content:"▸ "}
  /* !important: id-based rules like #fogMap{display:flex} outrank this selector */
  section.folded > *:not(h2){display:none !important}
  section.folded h2{margin-bottom:0;opacity:.72}
  section h2:hover{color:var(--accent)}
  /* These lines were breaking a word before the end — "…worked on outside this /
     project" — and balance is what actually stops it. Measured against the same
     text at eight widths: pretty left the dangling word exactly where it was at
     every one of them, while balance kept the sentence whole down to 460px and
     split it evenly below that. Browsers without it wrap as they did before. */
  .hint{font-size:14px;color:var(--ink3);margin:0 0 12px;text-wrap:balance}
  /* a count is one thing and reads as one — never split at the slash */
  #cov{white-space:nowrap}
  .hint u{text-decoration:underline wavy 2px;text-underline-offset:3px}
  .hint .ur{color:var(--op-read)} .hint .ug{color:var(--op-grep)}
  .hint .ue{color:var(--op-edit)}
  .hint b{color:var(--ink)}
  .rootnote{font-size:14px;color:var(--ink3);margin:-8px 0 10px}
  .rootnote b{color:var(--ink2);font-weight:700}

  /* fog map */
  #fogMap{display:flex;flex-direction:column;gap:6px}
  .fgrow{display:flex;align-items:flex-start;gap:10px}
  /* wide enough for what a row prints now that it only prints what changed —
     measured across real sessions that averages 17 characters. A rare long one
     still clips, and its whole path is in the tooltip.
     --depth is set per row; one number drives both the indent and the guides. */
  .fgrow .ilab{flex:none;width:232px;font-size:14.5px;font-weight:700;color:var(--ink2);padding-top:2px;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
    --step:14px; --depth:0; position:relative; padding-left:calc(var(--depth) * var(--step))}
  /* One faint stroke per segment this row carries over from the line above — the
     depth its text starts at. Strokes and not a ├ or a └ on purpose: the folder a
     row hangs off is usually inside the previous line's text rather than being a
     line of its own (measured on real sessions, 80–84% of indented rows), so a
     connector would point at the wrong one. A stroke claims depth and nothing
     about parentage, which is true in every case. Drawn through the same squiggle
     as everything else straight on this page, so it reads as pencil, not a rule. */
  .fgrow .ilab::before{content:'';position:absolute;left:0;top:1px;bottom:1px;pointer-events:none;
    width:calc(var(--depth) * var(--step));
    background:repeating-linear-gradient(to right,
      color-mix(in srgb, var(--ink3) 38%, transparent) 0 1.6px, transparent 1.6px var(--step));
    filter:url(#squiggle)}
  /* a folder searched as a whole wears the grep colour on its label, led by a
     small lens — the treemap shows it as a tile, this is its footprint here */
  .fgrow .ilab.searched{color:var(--op-grep)}
  .fsic{color:var(--op-grep);font-weight:700;pointer-events:none}
  .fgrow .ilab .fsic{margin-right:3px}
  #covSearch{color:var(--op-grep);white-space:nowrap}
  .fgcells{display:flex;flex-wrap:wrap;gap:5px;align-items:center;flex:1;min-width:0}
  .band{font-size:13px;color:var(--ink3);border:1.7px dashed var(--ink3);opacity:.55;
    border-radius:10px 14px 11px 15px / 14px 11px 15px 10px;padding:1px 9px;white-space:nowrap;flex:none}
  .band.wide{width:100%;text-align:center;padding:2px 0}
  /* An untouched stretch used to cost a line of text each, and on a long session
     that was 39 of them against 46 rows that actually had files — half the panel
     saying nothing but a number. It is a rule now, as long as what it stands for:
     a single folder is a tick, eight hundred runs the width of the panel. The
     counts are still there, on hover. */
  /* flex:none, not a basis: the panel is a column, so a flex-basis would be read
     as the height and swallow the one set here */
  .gap{flex:none;width:100%;height:11px;display:flex;align-items:center;justify-content:center}
  .gap i{display:block;height:0;border-top:1.7px dashed var(--ink3);border-radius:99px;
    filter:url(#squiggle)}
  .mc{width:22px;height:22px;border:1.7px solid var(--ink3);position:relative;flex:none;
    border-radius:6px 9px 7px 10px / 9px 7px 10px 6px}
  .mc.un{border-style:dashed;opacity:.4}
  /* The legend draws the real cell, shrunk — ■ and ◌ were standing in for a
     wobbly hand-drawn square and did not look like it, so the key needed a key.

<script>
  /* Which palette to draw in, decided before the first paint. The page's own
     script is a module and so runs after the document is parsed, which is one
     frame too late: a stored dark would light the page up white and then snap.
     Inline, here, is the only place that is early enough.
     'auto' is stored as nothing at all, so a machine that has never touched the
     mark keeps following the system, which is what it did before there was one. */
  (function () {
    var want = null;
    try { want = localStorage.getItem('cs-theme'); } catch (e) { /* private mode */ }
    if (want !== 'light' && want !== 'dark')
      want = matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
    document.documentElement.dataset.theme = want;
  })();
</script>

const LANGS = Object.keys(I18N);
let LANG = (()=>{ try{ const s = localStorage.getItem('cs-lang'); if (s && I18N[s]) return s; }catch(e){}
  return (navigator.language||'').toLowerCase().startsWith('ko') ? 'ko' : 'en'; })();
function t(k, vars){
  let s = (I18N[LANG] && I18N[LANG][k]) ?? I18N.en[k] ?? k;
  if (vars) for (const kk in vars) s = s.split('{'+kk+'}').join(vars[kk]);
  return s;
}

/* ══ palette ══ */
const css = () => getComputedStyle(document.documentElement);
let PAL = {};
function readPal(){
  const c = css();
  PAL = {
    heat: c.getPropertyValue('--heat').trim(),
    accent: c.getPropertyValue('--accent').trim(),
    read: c.getPropertyValue('--op-read').trim(),
    grep: c.getPropertyValue('--op-grep').trim(),
    edit: c.getPropertyValue('--op-edit').trim(),
    bash: c.getPropertyValue('--op-bash').trim(),
    del:  c.getPropertyValue('--bad').trim(),
    good: c.getPropertyValue('--good').trim(),
    warn: c.getPropertyValue('--warn').trim(),
    ink:  c.getPropertyValue('--ink').trim(),
    ink2: c.getPropertyValue('--ink2').trim(),
    ink3: c.getPropertyValue('--ink3').trim(),
    paper:c.getPropertyValue('--paper').trim(),
  };
}
readPal();

/* ══ theme ══
   auto → light → dark → auto. Auto is stored as nothing, so the mark has to have
   been pressed for the system to stop being followed. The <head> script already
   resolved it into data-theme before this file ran; everything here only has to
   keep that attribute honest and tell the drawing code to look again. */
const THEMES = ['auto', 'light', 'dark'];
let THEME = (()=>{ try{ const s = localStorage.getItem('cs-theme');
  return s === 'light' || s === 'dark' ? s : 'auto'; }catch(e){ return 'auto'; } })();
const sysDark = matchMedia('(prefers-color-scheme: dark)');
// what is actually on screen, which is what the canvases have to agree with
const isDark = () => document.documentElement.dataset.theme === 'dark';
const themeKey = () => 'theme' + THEME[0].toUpperCase() + THEME.slice(1);
function paintThemeBtn(){
  const b = $('btnTheme');
  if (!b) return;
  b.dataset.tip = tipBox(t(themeKey()), [], {note: t('themeTip')});
  b.setAttribute('aria-label', t('themeLabel'));
}
// The mark says what it just did, once, beside itself. Hovering tells you the
// same thing, but you are looking at the mark when you press it, not at a
// tooltip that has not appeared yet.
function sayTheme(){
  const el = $('sparkSay');
  if (!el) return;
  el.textContent = t('say' + THEME[0].toUpperCase() + THEME.slice(1));
  el.classList.remove('say');
  void el.offsetWidth;             // restart it mid-flight rather than wait it out
  el.classList.add('say');
}
function applyTheme(shout){
  document.documentElement.dataset.theme =
    THEME === 'auto' ? (sysDark.matches ? 'dark' : 'light') : THEME;
  readPal();                       // the custom properties just changed under us
  paintThemeBtn();
  renderFogLegend();               // its sample is filled from the palette too
  if (shout) sayTheme();
  if (S && S.ready) renderAll();   // every mark on every canvas is the old palette
}
function cycleTheme(){
  THEME = THEMES[(THEMES.indexOf(THEME) + 1) % THEMES.length];
  try{ THEME === 'auto' ? localStorage.removeItem('cs-theme')
                        : localStorage.setItem('cs-theme', THEME); }catch(e){}
  applyTheme(true);
}

let SESSIONS = [];
let PRICING = null, EDITOR = 'system';
let PROJECT = null, PROJECTS = [];
let OFFLINE = false;      // the server stopped answering; what is on screen is the last we knew
// Handed to this page by the server; every API call carries it back. EventSource

function newState(id){

    files:new Map(),      // path -> {ops,total,tokens,agents,reads,firstIx,delta,deltaT,lastT,hb:{}}
    agents:new Map(),     // name -> {count,tin,tout,model}
    opCount:{read:0,grep:0,edit:0,bash:0,task:0,del:0},
    opFiles:new Map(),    // tool_use id -> {file, agent} (matches results back to files)
    now:null,             // {file, ts} — what is being touched right now
    firstTs:0,            // first event — gives the session's working span
    tasks:new Map(),      // tool_use id -> {desc, sub, start, end, agent}
    live:new Map(),       // file -> the mark on it, while it lasts (parallel agents)
    all:[],               // raw op/res events — replayed when the agent filter changes
    seen:new Set(),       // their ids, so a reconnect's replayed backlog lands once
    filter:null,          // null = every agent, else an agent name

}
function passes(ev){ return !S.filter || ev.agent === S.filter || ev.t === 'res'; }
function rebuild(){        // recompute derived state for the current filter
  S.files = new Map(); S.opFiles = new Map(); S.n = 0;
  S.opCount = {read:0,grep:0,edit:0,bash:0,task:0,del:0};
  for (const a of S.agents.values()) a.count = 0;
  rowEls.clear();
  for (const ev of S.all) applyEvent(ev, true, true);

}
function setFilter(name){
  S.filter = (S.filter === name) ? null : name;
  rebuild();
}

function agentOf(name){
  let a = S.agents.get(name);
  if (!a){ a = {count:0, tin:0, tout:0, fresh:0, cw:0, cr:0, errs:0, model:'', task:null,
    firstTs:0, lastTs:0, lastOp:'', lastFile:''}; S.agents.set(name, a); }
  return a;
}
function fmtDur(ms){
  const s2 = Math.round(ms/1000);
  if (s2 < 60) return t('durS', {s: s2});
  const m = Math.floor(s2/60);
  return m < 60 ? t('durMS', {m, s: s2%60}) : t('durHM', {h: Math.floor(m/60), m: m%60});
}

function applyEvent(ev, silent, replay){
  if (ev.t === 'agent'){                       // subagent file appeared: pair it with its Task call
    const a = agentOf(ev.name);
    const paired = ev.toolUseId ? S.tasks.get(ev.toolUseId) : null;
    if (paired){ paired.agent = ev.name; a.task = paired; if (!paired.desc) paired.desc = ev.description; }
    else a.task = a.task || {desc: ev.description, sub: ev.agentType, start: 0, end: null, agent: ev.name};
    return;
  }
  if (ev.t === 'model'){ agentOf(ev.agent).model = shortModel(ev.model); return; }
  if (ev.t === 'usage'){
    const a = agentOf(ev.agent);
    a.tin = ev.tin; a.tout = ev.tout;
    a.fresh = ev.fresh || 0; a.cw = ev.cw || 0; a.cr = ev.cr || 0;
    return;
  }
  if (ev.t === 'title'){ const s = SESSIONS.find(x=>x.id===S.id); if (s){ s.title = ev.title; renderSessLinks(); } return; }
  // The turn opened (a prompt owes a reply) or closed (end_turn). This is the
  // live "working" signal for the session on screen — it holds through a think
  // that writes nothing, and drops the moment the turn ends, without waiting on
  // the /sessions poll. Not stored with the marks, so a filter rebuild leaves it.
  if (ev.t === 'open'){ agentOf(ev.agent).turnOpen = true; return; }
  if (ev.t === 'end'){ agentOf(ev.agent).turnOpen = false; return; }
  if (!replay && (ev.t === 'op' || ev.t === 'res')){
    // A dropped connection reconnects to a server that starts its backlog from
    // the top, so everything already on screen arrives a second time. Counting
    // it twice would double every number on the page. (usage/model/title carry
    // absolute values, so they can be applied again harmlessly.)
    const key = ev.t + ':' + ev.id;
    if (S.seen.has(key)) return;
    S.seen.add(key);
    S.all.push(ev);
    if (S.all.length > 60000){
      S.all.splice(0, 10000);
      S.seen = new Set(S.all.map(e => e.t + ':' + e.id));
    }
  }
  if (!passes(ev)) return;
  if (ev.t === 'res'){
    const tk = S.tasks.get(ev.id);             // a task's result = that subagent finishing
    if (tk && !tk.end) tk.end = ev.ts || Date.now();
    const m = S.opFiles.get(ev.id);
    if (m){
      const fs = S.files.get(m.file);
      if (fs){
        fs.tokens += Math.round(ev.len/4);
        if (ev.err){ fs.errs++; fs.lastErr = ev.ts; }
      }
      if (ev.err) agentOf(m.agent).errs++;
      // the read is over and we now know how much of the file came back — say so
      // on the mark, if the mark is still up.
      //
      // Whether this result was a read is remembered from the call that made it,
      // not read off whatever the mark says now. Those disagree constantly: a
      // mark is per file, and for 93% of a fan-out some file has two agents on
      // it, so one of them editing between this read's call and its result
      // flipped the mark to 'edit' and the line count was dropped on the floor.
      // Stored either way; TAG_FOR still decides which tag the mark shows.
      const live = S.live && S.live.get(m.file);
      if (!silent && live && Date.now() - live.ts < NOW_MS && m.op === 'read' && ev.rows > 1)
        tagOn(live, 'read', PAL.read, v => { v.rows = (v.rows || 0) + ev.rows; });
      S.opFiles.delete(ev.id);
    } else if (ev.err && S.lastEv) {
      agentOf(S.lastEv.agent).errs++;          // bash/task failures have no file
    }
    return;
  }
  if (ev.t !== 'op') return;
  const a = agentOf(ev.agent); a.count++;
  a.lastTs = ev.ts; a.lastOp = ev.op; a.lastFile = ev.file;
  if (!replay) a.turnOpen = true;          // a tool call means the turn is still open; a rebuild must not revive a closed one
  if (!a.firstTs || ev.ts < a.firstTs) a.firstTs = ev.ts;
  if (!S.firstTs || ev.ts < S.firstTs) S.firstTs = ev.ts;
  if (!replay) S.lastAny = ev;
  if (ev.op === 'task' && ev.id && !S.tasks.has(ev.id))
    S.tasks.set(ev.id, {desc: ev.desc || ev.file, sub: ev.sub, start: ev.ts, end: null, agent: null});
  S.opCount[ev.op] = (S.opCount[ev.op]||0)+1;
  S.lastEv = ev;
  if (ev.op === 'bash' || ev.op === 'task') return;
  const fs = S.files.get(ev.file) || {ops:{read:0,grep:0,edit:0,del:0}, total:0, tokens:0,
    agents:new Set(), reads:0, firstIx:S.n++, delta:0, deltaT:0, hb:{}, hbo:{}, hbd:{}, plus:0, minus:0,
    gone:false, errs:0, lastErr:0};
  fs.ops[ev.op] = (fs.ops[ev.op]||0)+1; fs.total++;
  if (ev.plus) fs.plus += ev.plus;
  if (ev.minus) fs.minus += ev.minus;
  // Deleted means "the last thing that happened to it was an rm". A file that
  // gets read or written afterwards is plainly back — restored from git, or the
  // rm never landed — and leaving it struck through says something untrue.
  // Events arrive in order, so the latest one is the answer.
  fs.gone = ev.op === 'del';
  fs.agents.add(ev.agent); fs.lastT = ev.ts;
  if (ev.op==='read') fs.reads++;
  if (!silent){
    fs.delta++; fs.deltaT = Date.now();
    // Agents work in parallel, so more than one file can be live at once. The
    // newest still wins S.now — it is what the arrow points at and what the
    // ticker reads — but the others stay marked instead of dropping to warm.
    // A file already live keeps its mark and its tags, so a second edit adds to
    // the numbers already on screen rather than starting a fresh count beside
    // them — three lines out then five in reads as one thing that happened.
    // When the event says it happened, not when this page heard about it. They
    // are not the same: events arrive in flushes, and measured against a real
    // fan-out a flush carries up to 114ms of work in one go. Stamped on arrival,
    // 24 of 142 consecutive events came out simultaneous — while not one pair
    // shared a transcript timestamp. That invented simultaneity is what put a
    // blue "reading!" on a green edit. Clamped, because a mark stamped in the
    // future would sit there past its twenty seconds.
    const stamp = Math.min(Date.now(), ev.ts || Date.now());
    const held = S.live.get(ev.file);
    const mark = (held && Date.now() - held.ts < NOW_MS) ? held
      // born is the stroke's own clock and its seed: while a file stays live the
      // highlighter keeps the shape it was drawn with and does not re-strike
      // itself on every call. That one really is about this page, so it stays on
      // the arrival clock. ts is when the work happened, which is what decides
      // when the mark has had its twenty seconds.
      : {file: ev.file, tags: new Map(), born: Date.now(), id: ev.id || ev.file};
    // A file touched again while the rubber was already over it used to snap
    // back whole on the next frame — half rubbed out, then instantly there
    // again. It is live, so it should come back; it should come back the way it
    // arrived the first time, drawn on. Restarting the stroke's clock does that.
    if (held === mark && Date.now() > dieAt(mark) - ERASE_MS) mark.born = Date.now();
    // forward only: a flush can deliver an older event after a newer one, and a
    // mark whose clock walked backwards would expire early
    mark.ts = Math.max(mark.ts || 0, stamp); mark.op = ev.op;
    mark.seen = Date.now();          // arrival, which only ever sets the floor
    mark.agent = ev.agent;
    // and the arrow follows the newest, which is no longer "whatever landed last"
    if (!S.now || stamp >= S.now.ts) S.now = mark;
    // an edit knows what it did the moment it lands; a read only finds out when
    // the result comes back, so that one is filled in later
    if (ev.plus || ev.minus)
      tagOn(mark, 'edit', PAL.edit, v => {
        v.plus = (v.plus || 0) + (ev.plus || 0);
        v.minus = (v.minus || 0) + (ev.minus || 0);
      });
    // delete before set, so the key moves to the back of the Map: setting an
    // existing key leaves it where it first went in, and the eviction below
    // takes the front one. Without this the busiest file — the one being
    // touched over and over — keeps its original place and is the first thing
    // thrown out, while a file touched once and never again sits there safe.
    S.live.delete(ev.file);
    S.live.set(ev.file, mark);
    if (S.live.size > LIVE_KEEP) S.live.delete(S.live.keys().next().value);
  }
  const b = Math.floor(ev.ts/BUCKET);
  fs.hb[b] = (fs.hb[b]||0)+1;
  // what kind of work it was, kept beside the count: the strip is a timeline, so
  // "read all through, then edited at the end" is the thing it should be able to
  // say. hb itself stays a plain count — heatScore reads it as one.
  (fs.hbo[b] = fs.hbo[b] || {})[ev.op] = ((fs.hbo[b] || {})[ev.op] || 0) + 1;
  if (ev.plus || ev.minus){
    const d = fs.hbd[b] = fs.hbd[b] || {plus:0, minus:0};
    d.plus += ev.plus || 0; d.minus += ev.minus || 0;
  }
  S.files.set(ev.file, fs);
  S.opFiles.set(ev.id, {file: ev.file, agent: ev.agent, op: ev.op});
  if (S.opFiles.size > 5000) S.opFiles.delete(S.opFiles.keys().next().value);
}

/* ══ data loading ══ */
// Restarting the server issues a new token, which leaves an open tab holding a
// dead one: every call comes back 403 and the page quietly stops updating.
// Nothing on screen is recoverable in that state, so fetch a fresh page — once,
// guarded against a loop if the 403 turns out to be something else.
async function api(path){
  const res = await fetch(path);
  if (res.status === 403){
    const last = Number(sessionStorage.getItem('cs-reloaded') || 0);
    if (Date.now() - last > 10000){
      sessionStorage.setItem('cs-reloaded', String(Date.now()));
      location.reload();
    }
    throw new Error('stale token');
  }
  // A status is the server answering. Only a fetch that never landed at all
  // means it stopped — the difference decides what the page tells you.
  if (!res.ok){
    const err = new Error('http ' + res.status);
    err.status = res.status;
    throw err;
  }
  return res.json();
}
async function loadMeta(){
  try{
    const m = await api('/api/meta' + q());
    PROJECT = m.project;
    PRICING = m.pricing; EDITOR = m.editor || 'system';
    $('projPick').addEventListener('click', ()=> pickerOpen ? closePicker() : openPicker());
    try{
      const r = await api('/api/projects' + q());
      PROJECTS = r.projects || [];
    }catch(e){ PROJECTS = []; }
    // a reload should stay on the folder you picked, not snap back to --project
    const want = savedProject();
    if (want && want !== PROJECT && PROJECTS.some(p => p.root === want)) PROJECT = want;
    if (PROJECT !== m.project) rememberProject(PROJECT);
    $('projPick').innerHTML = esc(PROJECT) + '<span class="caret">▾</span>';
  }catch(e){ $('projPick').textContent = '?'; }
}
async function loadUniverse(){
  try{
    const u = await api('/api/universe' + q(S ? {session: S.id} : {}));
    const dirs = new Map();
    for (const p of u.files){
      const d = dirOf(p);
      if (!dirs.has(d)) dirs.set(d, []);
      dirs.get(d).push(p.split('/').pop());
    }
    UNIVERSE = {
      tree: [...dirs.entries()].sort((a,b)=>a[0].localeCompare(b[0])),
      total: u.files.length,
      set: new Set(u.files),
      truncated: !!u.truncated, listed: u.total || u.files.length,
    };
  // A failed refresh should leave what we already know on screen — blanking it
  // would empty the fog map and drop coverage to nothing over one bad request.
  }catch(e){ UNIVERSE = UNIVERSE || {tree:[], total:0, set:new Set()}; }
}
async function loadSessions(){
  try{
    const r = await api('/api/sessions' + q());
    // The open session's title is the parser's, kept live off the event stream
    // over the whole transcript. The poll reads only the tail and can lag it by a
    // question while one is arriving, so letting it overwrite made the two take
    // turns — the label flicked from the newest question to the one before and
    // back on every poll. Keep the parser's for the session on screen; the poll
    // still names all the others.
    const held = S && SESSIONS.find(x => x.id === S.id);
    SESSIONS = r.sessions || [];
    if (held && held.title){
      const cur = SESSIONS.find(x => x.id === S.id);
      if (cur) cur.title = held.title;
    }
    OFFLINE = false;
  }catch(e){
    // A 404 is the server telling us it does not know this folder — the saved
    // ?project= has gone stale. That is not the backend being gone, and saying
    // so sent people looking for a process that was running the whole time.
    if (e.status){ SESSIONS = []; OFFLINE = false; }
    // the sessions did not go anywhere, the server did — keep them on screen
    // and say what actually happened
    else OFFLINE = true;
  }
  renderSessLinks();
  if (!S && SESSIONS.length) selectSession((SESSIONS.find(s=>s.active) || SESSIONS[0]).id);
}

function selectSession(id){
  if (S && S.id === id) return;
  if (ES) ES.close();
  S = newState(id);
  liveBuf = [];
  rowEls.clear();
  $('ticker').textContent = t('connecting');
  renderSessLinks();
  // The file list belongs to the session, not the folder: one folder can hold a
  // hundred sessions and a few of them worked somewhere else entirely. Boot
  // fetches it before there is a session to name, so ask again now there is.
  loadUniverse().then(()=>{ if (S && S.id === id && S.ready) renderAll(); });
  ES = new EventSource('/events' + q({session: id}));
  ES.onmessage = (m) => {
    let d; try{ d = JSON.parse(m.data); }catch(e){ return; }
    if (d.t === 'backlog'){
      const silent = !S.ready;
      for (const ev of d.events){
        if (!silent && !running){ liveBuf.push(ev); continue; }
        applyEvent(ev, silent);
      }
      if (S.ready && running){ scheduleRender(); if (S.lastEv) renderTicker(S.lastEv); }
    } else if (d.t === 'ready'){
      S.ready = true;
      if (d.title){ const s = SESSIONS.find(x=>x.id===S.id); if (s && !s.title) s.title = d.title; }
      renderAll();
      if (S.lastEv) renderTicker(S.lastEv);
    }
  };
}

const RENDER_MS = 250;       // a flood of events costs one repaint, not one each
let lastRender = 0;
function scheduleRender(){
  if (renderQueued) return;
  renderQueued = true;
  // The first event after a lull draws straight away — that is the one being
  // watched for, and making it wait out the full window was most of what the
  // page felt like. A burst still coalesces: the next event inside the window
  // waits out whatever is left of it.
  const wait = Math.max(0, RENDER_MS - (Date.now() - lastRender));
  setTimeout(()=>{ renderQueued = false; if (S && S.ready) renderAll(); }, wait);
}

function fileTip(p, fs, openable){

  if (fs.ops.grep) rows.push([t('lblSearch'), String(fs.ops.grep)]);

// "Working" is read from whose turn it is, not from the clock. The parser marks
// the turn open when a prompt lands and closed on end_turn, so the session on
// screen (see isLive) flips the instant work starts or stops — including through
// a long think or a streamed answer, when no tool call is arriving to prove it.
// mtime alone could not: it read a long think as idle and a just-finished turn
// as busy for a further 45s. A subagent, which has no such turn of its own, is
// still judged by how lately it last did anything.
const BUSY_MS = 45000;                     // a subagent quiet this long reads as done
const NOW_MS = 20000;   // how long a highlight stays up — the same everywhere, so

// 14 files and p90 25 — and spent 74.6% of that time above the old cap, hiding
// files that were being worked on right then. Two agents on one file was true
// for 92.8% of it, which is exactly what a cap of 8 cannot show.

const LIVE_KEEP = 256;

function tagOn(mark, kind, col, apply){

  apply(v);
  v.hit = Date.now();
  mark.tags.set(kind, v);
}
// Built when it is drawn, never stored, so what is on screen is the running
// total and not whatever it said when the tag first appeared. In pieces, because
// lines added and lines taken away are not the same news and should not be the
// same colour.
function tagParts(kind, v){
  if (kind === 'read') return [{ text: t('popRead', {n: v.rows}), col: PAL.read }];
  const out = [];
  if (v.plus) out.push({ text: '+' + v.plus, col: PAL.edit });
  if (v.minus) out.push({ text: '−' + v.minus, col: PAL.del });

// When a mark is done with. Twenty seconds from when the work happened — except
// that the work can reach this page long after it happened, and a mark measured
// only from the event's own clock would be born expired.
//
// Measured outside this tool entirely, by polling the transcript's size every
// 100ms: a main-agent tool call reaches the disk p50 6.2s and p90 19.9s after
// the record says it happened, in bursts — four of eight inside 310ms, the rest
// between 6 and 20 seconds. Subagents arrive in ~150ms, so this is the single
// most common case, not the rare one: one agent working on its own. Timing the

const MIN_LIFE = 6000;

function isWarm(fs){ return !!(fs.lastT && Date.now()-fs.lastT < WARM_MS); }
/* ══ live marks — crayon ══
   Everything the eye should snap to is drawn by hand on an overlay canvas:
   a scribbled loop, an arrow, a highlighter swipe, ink flecks off an edit.

   This used to claim the lines keep crawling — a fresh seed ten times a second,
   the boil of a pencil animation, and that boil rather than the colour being
   what reads as "this is happening right now". None of that is true and it never
   was. A mark's seed is its own and does not change, and prog reaches 1 after
   DRAW_MS, so from 340ms until its twenty seconds are up every frame of a
   highlighter is identical to the last. What actually moves is the arrow and its
   label, which shake; the tag, which is flicked when its number changes; and the
   rubber at the end. The stroke drawing itself on is the arrival; after that a
   mark simply sits there, and the panel is none the worse for it.

   Worth knowing before optimising: the redraw is real work — 20fps across three
   panels — but it is small, 536µs a frame with 96 marks and 8 arrows up, so
   there is no pressing reason to cache what does not change. And worth knowing
   before adding the boil for real: 32 marks all crawling at once is a different
   picture from one, and that is a decision to make on screen rather than from
   the comment that used to describe it. */
const SPLAT_MS = 900;
const ERASE_MS = 1500;      // a highlight is rubbed out, never faded
const LIVE_DPR = () => Math.min(devicePixelRatio || 1, 2);

const nowLeft = () => (S && S.now) ? dieAt(S.now) - Date.now() : -1;

// The canvas hangs out past its panel on every side, so an arrow or a label
// parked at the edge is drawn in the margin instead of being sliced off.
// How far outside its panel a live mark may draw. The arrow and its label go up
// and out, so the top row of a panel needs the headroom: at 34 the label cleared
// the ceiling by one pixel and the tag above it was cut off by eleven. Measured
// against the tallest thing a mark now draws — tag over label over arrow. Plus
// the two extra bands a label can be lifted into when several arrows are on
// neighbouring files, which is what a fan-out through a directory looks like.
// The canvases hang outside their panels on purpose, and being absolutely
// positioned they still count towards how wide the document is. Measured on a
// 377px viewport the page ran 204px past its own edge, 44 of it these margins.

const PAD_Y = 76 + 40;

fitPad();
function fitLive(id, host){

    cv.width = Math.round(W*dpr); cv.height = Math.round(H*dpr);
    cv.style.width = W+'px'; cv.style.height = H+'px';
    cv.style.left = -PAD_X+'px'; cv.style.top = -PAD_Y+'px';

  c.setTransform(dpr,0,0,dpr,0,0);
  c.clearRect(0,0,W,H);
  c.translate(PAD_X, PAD_Y);       // callers keep working in panel coordinates

// what a live mark is coloured and called: a read and an edit should not look
// like the same event
// A deletion in blood red reads as an alarm; it isn't one. Pencil grey says
// "this one's gone" without the sirens.
//
// Given an op rather than read off S.now. There is no longer one live op to
// speak of: with an arrow per agent, six of them can be pointing at six
// different kinds of work at once, and a global would paint them all whatever
// the last event happened to be.
const opInk = (op) => (op === 'del') ? PAL.ink3 : opCol(op || 'read');
