// Highlighter, not crayon: a chisel tip laid over the thing, one pass per line,
// overshooting at both ends. Multiply blend is the whole trick — where two
// passes overlap the colour doubles, which is what makes a marker read as a
// marker. Drawn on left to right, then it just sits there; no wobble.
const MARK_H = 17;                       // chisel width

// one stroke of the chisel tip, straddling the line from a to b
function chisel(c, ax, ay, bx, by, h, rnd, col, alpha){
  const dx = bx-ax, dy = by-ay, L = Math.hypot(dx,dy) || 1;
  const nx = -dy/L, ny = dx/L;
  const h0 = h*(0.85 + rnd()*0.3)/2, h1 = h*(0.85 + rnd()*0.3)/2;
  c.globalAlpha = alpha;
  c.fillStyle = col;
  c.beginPath();
  c.moveTo(ax + nx*h0, ay + ny*h0);
  c.lineTo(bx + nx*h1, by + ny*h1);
  c.lineTo(bx - nx*h1, by - ny*h1);
  c.lineTo(ax - nx*h0, ay - ny*h0);
  c.closePath();
  c.fill();
}

// Round the edge of a box rather than over the whole of it — a big treemap tile
// flooded with marker buries the thing it is pointing at.
function markerEdge(c, box, seed, prog, col){
  const rnd = mulberry(seed);
  const o = 7, x2 = box.x + box.w, y2 = box.y + box.h;
  const segs = [
    [box.x-o, box.y,  x2+o, box.y],       // along the top, running past both corners
    [x2, box.y-o,     x2,   y2+o],
    [x2+o, y2,        box.x-o, y2],
    [box.x, y2+o,     box.x, box.y-o],
  ];
  const lens = segs.map(s => Math.hypot(s[2]-s[0], s[3]-s[1]));
  let want = lens.reduce((a,b)=>a+b, 0) * prog;
  c.save();
  c.globalCompositeOperation = isDark() ? 'screen' : 'multiply';
  for (let i = 0; i < segs.length && want > 0; i++){
    const [ax, ay, bx, by] = segs[i];
    const f = Math.min(1, want/lens[i]);
    want -= lens[i];
    chisel(c, ax, ay, ax + (bx-ax)*f, ay + (by-ay)*f, MARK_H, rnd, col, 0.32 + rnd()*0.08);
  }
  c.restore();
}

function marker(c, box, seed, prog, col){
  const rnd = mulberry(seed);
  const lines = Math.max(1, Math.round(box.h/(MARK_H*0.7)));   // passes overlap, as they do
  const step = box.h/lines;
  c.save();
  c.globalCompositeOperation = isDark() ? 'screen' : 'multiply';
  c.fillStyle = col;
  for (let i = 0; i < lines; i++){
    const over = 5 + rnd()*9;                                  // runs past the edges
    const x0 = box.x - over;
    const x1 = box.x + box.w*prog + (prog > 0.98 ? over : 0);
    if (x1 <= x0) continue;
    const yc = box.y + step*(i+0.5) + (rnd()-0.5)*2.5;
    const tilt = (rnd()-0.5)*3.5;                              // the hand isn't level
    const h0 = MARK_H*(0.86 + rnd()*0.3), h1 = h0*(0.9 + rnd()*0.2);
    c.globalAlpha = 0.3 + rnd()*0.08;
    c.beginPath();                                             // a chisel leaves a wedge
    c.moveTo(x0, yc - h0/2);
    c.lineTo(x1, yc + tilt - h1/2);
    c.lineTo(x1, yc + tilt + h1/2);
    c.lineTo(x0, yc + h0/2);
    c.closePath();
    c.fill();
    if (prog < 0.99){                                          // ink pools where it stopped
      c.globalAlpha = 0.22;
      c.fillRect(x1 - 3.5, yc + tilt - h1/2, 3.5, h1);
    }
  }
  c.restore();
}

// Paper rubbed in behind something, so it stays legible over a hatched tile.
// Not a filled box — a handful of overlapping passes, thick and a little past
// the edges, the way you would scrub a space clear with the side of a pencil.
// Paper colour rather than white, so it follows the theme into the dark.
function paperUnder(c, x, y, w2, h2, rnd, alpha){
  c.save();
  c.strokeStyle = PAL.paper;
  c.lineCap = 'round';
  const n = Math.max(2, Math.round(h2/6));
  c.lineWidth = (h2/n)*2.1;
  for (let i = 0; i < n; i++){
    const yy = y + h2*(i+0.5)/n + (rnd()-0.5)*2.2;
    c.globalAlpha = alpha*(0.55 + rnd()*0.2);      // uneven, so overlaps show
    c.beginPath();
    c.moveTo(x - 4 - rnd()*5, yy + (rnd()-0.5)*2);
    c.lineTo(x + w2 + 4 + rnd()*5, yy + (rnd()-0.5)*2);
    c.stroke();
  }
  c.restore();
}

// What the mark cost: the line count of an edit the moment it lands, the size of
// a read when the file comes back. It jumps in and then stays — a tag tucked in
// above the label at an angle, rather than a number that blinks past before it
// can be read. The mark's own rubber takes it away at the end, along with
// everything else the mark drew.
const POP_IN_MS = 260;              // the arrival hop
// When the count moves the tag gets flicked: it jumps, rocks a few times and
// settles, all of it dying away on its own. Nothing on this page moves in a
// straight line, and a number that changed should be seen changing.
const POP_HIT_MS = 620;
function flick(since){
  if (REDUCED || since > POP_HIT_MS) return { lift: 0, tilt: 0, grow: 1 };
  const h = 1 - since / POP_HIT_MS;                 // 1 → 0
  const rock = h * Math.sin(since / POP_HIT_MS * Math.PI * 3.4);
  return { lift: h * h * 7, tilt: rock * 0.16, grow: 1 + h * h * 0.2 };
}
// One tag, for what the label is saying right now. A file read and then edited
// keeps both counts — they are still adding up underneath, and going back to
// reading brings the read total back — but drawing both put "145 lines" from the
// read beside a label reading "fixing!", the two of them close enough to collide.
const TAG_FOR = { read: 'read', edit: 'edit' };
// Returns how wide the tag came out, or 0 for nothing drawn — the rubber has to
// take the whole gesture, and a tag it did not know about is a tag left behind.
function popUp(c, x, y, mark, alpha){
  const kind = mark && TAG_FOR[mark.op];
  const v = kind && mark.tags && mark.tags.get(kind);
  if (!v) return 0;
  const parts = tagParts(kind, v);
  if (!parts.length) return 0;
  const now = Date.now();
  const GAP = 5;
  c.save();
  c.textAlign = 'left'; c.textBaseline = 'bottom';
  c.font = '700 13px ' + (css().getPropertyValue('--hand').trim() || 'cursive');
  {
    const k = REDUCED ? 1 : Math.min(1, (now - v.at) / POP_IN_MS);
    const ease = 1 - Math.pow(1 - k, 3);
    // flicked on the way in, and again every time the count moves underneath
    const f = flick(now - v.hit);
    const widths = parts.map(p => c.measureText(p.text).width);
    const w = widths.reduce((a, b) => a + b, 0) + GAP * (parts.length - 1);
    const rnd = mulberry(hash(kind));
    c.save();
    // turned about its middle, not its left end: tilting a 40px tag from one end
    // lifts the far end by the whole width times the angle, which put the "−3" of
    // a "+2 −3" through the top of the panel. About the middle it is half that,
    // and it goes down as much as it goes up.
    c.translate(x + 10 * ease + w / 2, y - 10 * ease - f.lift);
    // a wider tag turns less, so however long the number gets its ends never
    // rise more than a few pixels above the middle
    c.rotate(-Math.min(0.16, 5 / Math.max(1, w / 2)) + f.tilt);
    c.scale(f.grow, f.grow);
    c.globalAlpha = (alpha ?? 1) * ease;
    paperUnder(c, -w / 2 - 3, -12, w + 6, 16, rnd, c.globalAlpha);
    let dx = -w / 2;
    parts.forEach((p, j) => {
      c.fillStyle = p.col || PAL.ink2;
      c.fillText(p.text, dx, 0);
      dx += widths[j] + GAP;
    });
    c.restore();
    c.restore();
    return w;                  // the caller has to know how far this reached
  }
}

// The arrow and its label are one gesture, so they shake as one — a rigid
// jitter, not a redrawn one. Two frequencies that don't divide into each other,
// so it never settles into a rhythm you can predict.
function shake(){
  if (REDUCED) return { x: 0, y: 0, a: 0 };
  const t = Date.now()/1000;
  return {
    x: Math.sin(t*13.7)*1.3 + Math.sin(t*7.1)*0.7,
    y: Math.cos(t*11.3)*1.1 + Math.sin(t*5.3)*0.5,
    a: Math.sin(t*9.7)*0.012,
  };
}

// arrow + "지금!" — drawn on whichever side has more room for it
//
// This used to be "left, unless within 70px of the edge", which was a fine rule
// for a label reading "reading!". One reading "ws63 fixing! 12 lines" is more
// than twice that, and on a treemap tile near the left edge it ran off the
// canvas and lost its first word. Measure the label, then pick the side.
const labelSide = (r, w, wide) => {
  const room = (space) => space + PAD_X - 12;
  const l = room(r.x), rr = room(w - (r.x + r.w));
  if (l >= wide && rr >= wide) return l >= rr;   // both fit: the roomier one
  return l >= rr;                                // neither does: lose less of it
};
// pops ride beside the label — the eye is already there — and fall back to the
// mark's own corner for the live files that have no arrow.
//
// `word` and `col` come in rather than off S.now: each arrow is a different
// agent doing a different thing, so each says its own word in its own colour.
// `code` is who — "ws3", or "ws3 gp2" where several are on one file, which is
// most of a fan-out. Dropped when only one agent is working, because then it
// names the only thing on screen. Measured against the 836px panel: the full
// form is 170px and four fit, a real agent name is 240px and three fit, a code
// is 78px.
// Three heights, cycled by how recent the arrow is. Under a wide fan-out the
// live files are neighbours — agents work through a directory — so every label
// landed at the same height in the same band and the six of them were a smear.
// Three bands is enough to pull them apart without needing the headroom six
// would: adjacent arrows are never on the same line.
const RISE = 20, BANDS = 3;
function pointAt(c, r, w, seed, alpha, mark, col, word, codes, band){
  const HAND = (css().getPropertyValue('--hand').trim() || 'cursive');
  // Who *and* what. The code was briefly allowed to replace the word, on the
  // reasoning that the highlighter colour already says whether this is a read or
  // an edit. It does — but an arrow reading only "main" says nothing about what
  // main is doing, and the payload beside it is empty whenever the result has
  // not come back yet, so the whole gesture went blank. Identity was meant to be
  // added, not traded for. The word costs about 34px next to a code.
  //
  // How many names fit is decided by measuring, not by counting to three. The
  // word is a different length in every language the page speaks — measured in
  // the bundled fonts, the Japanese form is 14% wider than the English and 20%
  // wider than the Korean — so a fixed count of names is a different label width
  // in each of them, and "three names" is only ever right for one.
  c.save(); c.font = '700 16px ' + HAND;
  let say = word;
  if (codes && codes.length){
    const budget = Math.max(150, Math.min(330, w * 0.34));
    let out = codes[0], n = 1;
    while (n < codes.length){
      const more = codes.length - (n + 1);
      const test = out + ' ' + codes[n] + (more ? ' +' + more : '') + ' ' + word;
      if (c.measureText(test).width > budget) break;
      out += ' ' + codes[n]; n++;
    }
    const left = codes.length - n;
    say = out + (left > 0 ? ' +' + left : '') + ' ' + word;
  }
  const tw = c.measureText(say).width;
  c.restore();
  const left = labelSide(r, w, tw + 46);        // the label, and room for its tag
  const tx = left ? r.x-7 : r.x+r.w+7, ty = r.y + Math.min(r.h/2, 14);
  const len = 30, rise = ((band || 0) % BANDS) * RISE;
  const sx = tx + (left ? -len : len), sy = ty - len*0.8 - rise;
  if (sx < -PAD_X+4 || sx > w+PAD_X-4 || sy < -PAD_Y+16) return;
  c.save();
  const sh = shake();                       // the whole gesture moves together
  c.translate(tx + sh.x, ty + sh.y);
  c.rotate(sh.a);
  c.translate(-tx, -ty);                    // pivot on the tip, which stays on target
  c.lineCap = 'round';

  // the same seed twice: the paper underneath follows the arrow's own wobble
  c.globalAlpha = alpha*0.8;
  c.strokeStyle = PAL.paper;
  const under = mulberry(seed);
  for (const lw of [9, 6]){
    c.lineWidth = lw;
    c.beginPath(); wavyLine(c, sx, sy, tx, ty, under, 2); c.stroke();
  }

  const rnd = mulberry(seed);
  c.strokeStyle = col; c.lineWidth = 2.6;
  c.globalAlpha = alpha;
  c.beginPath(); wavyLine(c, sx, sy, tx, ty, rnd, 2); c.stroke();
  const dx = (tx-sx)/len, dy = (ty-sy)/len;                    // two-stroke head
  for (const a of [2.5, -2.5]){
    const hx = tx + (dx*Math.cos(a) - dy*Math.sin(a))*11;
    const hy = ty + (dx*Math.sin(a) + dy*Math.cos(a))*11;
    c.beginPath(); wavyLine(c, tx, ty, hx, hy, rnd, 1.4); c.stroke();
  }

  c.translate(sx, sy - 5);
  c.rotate(-0.13 + (rnd()-0.5)*0.06);
  c.font = '700 16px ' + HAND;
  c.textAlign = left ? 'right' : 'left'; c.textBaseline = 'bottom';
  paperUnder(c, left ? -tw : 0, -15, tw, 19, rnd, alpha);
  c.fillStyle = col; c.globalAlpha = alpha;
  c.fillText(say, 0, 0);
  // beside the word, in the label's own frame, so the two read as one thing
  c.textAlign = 'left';
  const pw = popUp(c, left ? 6 : tw + 6, 0, mark, alpha);
  c.restore();

  // What this gesture actually covered, in panel coordinates, so the rubber can
  // take all of it. It used to be guessed at — 124px to the left of the cell,
  // 40px above — and the guess was made when the label read "reading!". A label
  // now reads "ws51 fixing! 12 lines", which is past the end of that box, so the
  // rubber lifted the arrow and left the words hanging there, shaking, until
  // their twenty seconds ran out. Measured instead of assumed: the label is
  // rotated about its start, so its far end rides up by roughly width × the
  // angle, and the tag above it lifts further again.
  const wide = tw + (pw ? pw + 12 : 0);
  const x0 = Math.min(tx, sx) - (left ? wide + 10 : 0);
  const x1 = Math.max(tx, sx) + (left ? 0 : wide + 10);
  const top = sy - 5 - 20 - wide * 0.15 - 16;      // label box, its tilt, the tag
  const bot = Math.max(ty, sy) + 12;
  const pad = 7;                                    // the shake, and the pen's width
  return { x: x0 - pad, y: top - pad, w: (x1 - x0) + pad*2, h: (bot - top) + pad*2 };
}

// A mark's last moment: it doesn't dissolve, someone rubs it out. The rubber
// runs back and forth and takes the drawing with it — destination-out, so it is
// the ink itself being lifted, not paper painted over the top.
function rubOut(c, box, seed, k){
  const rnd = mulberry(seed);
  const N = 5;                                       // swipes, alternating direction
  const cx = box.x + box.w/2, cy = box.y + box.h/2;
  const len = box.w + 80;
  c.save();
  // The swipe deliberately runs well past the mark — that overshoot is the
  // gesture. It is also, on a canvas that now carries every live mark at once,
  // eighty pixels of destination-out reaching into whatever is drawn beside it.
  // Clipped to the mark's own footprint the stroke still sweeps in from outside,
  // and lifts only this mark's ink.
  c.beginPath();
  c.rect(box.x, box.y, box.w, box.h);
  c.clip();
  c.globalCompositeOperation = 'destination-out';    // lift the ink, don't paint over it
  c.lineCap = 'round';
  c.globalAlpha = 1;
  c.lineWidth = Math.max(15, box.h/N*2.5);
  for (let i = 0; i < N; i++){
    const p = Math.min(1, Math.max(0, (k - (i/N)*0.78)/0.32));
    if (p <= 0) continue;
    const dir = i % 2 ? -1 : 1;                      // back, forth, back…
    const slope = (rnd()-0.5)*0.55;
    const y = cy + ((i+0.5)/N - 0.5)*box.h*1.2 + (rnd()-0.5)*4;
    const x0 = cx - dir*len/2, y0 = y - dir*slope*len/2;
    c.beginPath();
    c.moveTo(x0, y0);
    c.lineTo(x0 + dir*len*p, y0 + dir*slope*len*p);
    c.stroke();
  }
  c.restore();
}

// an edit lands: flick a few specks off the number
function splat(c, x, y, seed, k, col){
  const rnd = mulberry(seed);
  c.save();
  c.fillStyle = col;
  for (let i = 0; i < 7; i++){
    const a = rnd()*Math.PI*2, d = (7 + rnd()*18)*(0.35 + k);
    const rr = Math.max(0.4, (1-k)*(1.3 + rnd()*2.3));
    c.globalAlpha = (1-k)*(0.45 + rnd()*0.5);
    c.beginPath();
    c.ellipse(x + Math.cos(a)*d, y + Math.sin(a)*d - k*9, rr, rr*(0.7+rnd()*0.7), a, 0, 7);
    c.fill();
  }
  c.restore();
}

// how far into being rubbed out a mark is: the last ERASE_MS of whatever life
// it turned out to have, which is not the same for every mark once a late
// arrival can put a floor under one
const rubK = (n) => (Date.now() - (dieAt(n) - ERASE_MS)) / ERASE_MS;
// Everything the mark occupies, so the rubber takes the whole thing and not just
// the ring. Which is not the same box for every mark: only a mark with an arrow
// on it needs the room the arrow and its label take up. Sized for all of them,
// the box was 162×74 around a 22px footprints cell — seven times the area — and
// since a rubber lifts whatever is under it, the one mark on its way out took
// its neighbours' marks with it, then let them back the moment it expired and
// the next one started its own erase from nothing. Off by one cell it would have
// been a smudge; at this size it read as the whole panel blinking.
// Just the highlighter's overshoot now. Whatever an arrow added on top reports
// its own extent, and the two are joined below — no constant here has to be kept
// in step with how long a label happens to be.
const markBox = (r) => ({ x: r.x-16, y: r.y-10, w: r.w+32, h: r.h+20 });
const union = (a, b) => {
  if (!b) return a;
  if (!a) return b;
  const x = Math.min(a.x, b.x), y = Math.min(a.y, b.y);
  return { x, y, w: Math.max(a.x+a.w, b.x+b.w) - x, h: Math.max(a.y+a.h, b.y+b.h) - y };
};

const DRAW_MS = 340;                     // how long the pen takes to cross the mark

/* Where each panel's box for a path sits, read once and kept.
   Reading offsetLeft/offsetTop off a DOM node after anything has written to the
   DOM forces a synchronous layout. drawLive ran twenty times a second and did it
   per live file, per frame: measured on a 5000-file repo that is 1.4ms a frame —
   three times what drawing ninety-six marks costs, so the panel was paying for
   layout, not for ink. The treemap lookup was a linear scan of every rect for
   every live file, which is the same mistake in a smaller way.
   Rebuilt when a render replaces the boxes, and whenever a panel's width no
   longer matches what was measured — one clientWidth read a frame is cheap; N
   offset reads are not. */
let GEOM = null;
const dropGeom = () => { GEOM = null; };
function geom(fogHost, rowHost, tmHost){
  const fw = fogHost.clientWidth, rw = rowHost.clientWidth, tw = tmHost.clientWidth;
  if (GEOM && GEOM.fw === fw && GEOM.rw === rw && GEOM.tw === tw) return GEOM;
  const fog = new Map(), rows = new Map(), tm = new Map();
  for (const el of fogHost.querySelectorAll('.mc[data-path]'))
    fog.set(el.dataset.path,
      { x: el.offsetLeft, y: el.offsetTop, w: el.offsetWidth, h: el.offsetHeight });
  for (const [p, v] of rowEls){
    const el = v && v.el;
    if (el && el.isConnected) rows.set(p, { x: 0, y: el.offsetTop - 1, w: rw, h: el.offsetHeight + 2 });
  }
  // first wins, the way the linear scan did
  for (const r of TM_RECTS) if (!r.agg && !tm.has(r.path)) tm.set(r.path, r);
  return (GEOM = { fog, rows, tm, fw, rw, tw });
}

// What the cap is hiding, said out loud on the panel rather than dropped —
// the way coverage says "only the first 20000 of 20026". In the hand, small,
// tucked under the map: it is a footnote, not news.
function overflowNote(c, n, w, h){
  if (n <= 0) return;
  c.save();
  c.font = '700 13px ' + (css().getPropertyValue('--hand').trim() || 'cursive');
  c.textAlign = 'right'; c.textBaseline = 'top';
  c.globalAlpha = 0.75;
  c.fillStyle = PAL.ink3;
  c.fillText(t('liveCapped', {n}), w, h + 4);
  c.restore();
}

/* Who is being pointed at.
   Keyed by agent, not by file. A file's mark outlives the work on it — a mark
   lives twenty seconds and an agent moves every ~2.3 — so an arrow keyed by file
   spends most of its time pointing at something that is over: measured, 58.9% of
   what it would point at is more than five seconds old, against 35.0% keyed by
   agent. Live files also have no ceiling (p90 25, and that against a fixture of
   thirty) while live agents peak at ten, so a per-file cap bites constantly and
   LRU picks what to hide. Keyed by agent the set is small, stable between frames
   and always that agent's current target.
   Several agents on one file share an arrow rather than stacking six identical
   ones on the same 22px box — that is 92.8% of a fan-out, so it is the normal
   case and drawing it six times is noise, not information. */
const ARROW_MAX = 6;
function liveArrows(){
  const now = Date.now(), out = [];
  for (const [nm, a] of S.agents){
    if (!a.lastFile || !a.lastTs || now - a.lastTs >= NOW_MS) continue;
    if (a.lastOp === 'bash' || a.lastOp === 'task') continue;   // points at no file
    const mark = S.live.get(a.lastFile);
    if (!mark || now - mark.ts >= NOW_MS) continue;
    out.push({ name: nm, file: a.lastFile, op: a.lastOp, ts: a.lastTs, mark });
  }
  out.sort((x, y) => (y.ts - x.ts) || x.name.localeCompare(y.name));
  return out.slice(0, ARROW_MAX);
}

function drawLive(){
  const all = liveNow();                     // newest first
  // The cap is applied here rather than on the way in, so the ones past it are
  // still known and can be counted instead of vanishing.
  const live = all.slice(0, LIVE_MAX);
  const hidden = all.length - live.length;

  // one entry per file being pointed at, carrying whoever is on it
  const A = liveArrows();
  const solo = A.length <= 1;                // "ws3" says nothing when it is the only one
  const byFile = new Map();
  for (const ar of A){
    if (!byFile.has(ar.file))
      byFile.set(ar.file, { op: ar.op, codes: [], band: byFile.size });   // newest first
    byFile.get(ar.file).codes.push(shortAgent(ar.name));
  }
  // the names go to the arrow whole; how many of them fit is its business,
  // because only it knows the font and the room
  const label = (v) => solo ? null : v.codes;

  // The panels are cleared by fitLive, so they are set up once and every live
  // file draws into them.
  const tmHost = $('tm').parentElement, fogHost = $('fogMap'), rowHost = $('rows');
  const tc = fitLive('tmNow', tmHost);
  const fc = fitLive('fogNow', fogHost);
  const rc = fitLive('rowsNow', rowHost);
  if (!live.length) return;

  // Every cell with a path, not only the ones already wearing .now — the class
  // is added by updateFog, so a file that went live since the last render was
  // being left unmarked until one came round. S.live is the authority on what is
  // live; the class is an outline that draws nothing any more.
  const G = geom(fogHost, rowHost, tmHost);
  if (fc) overflowNote(fc, hidden, G.fw, fogHost.clientHeight);

  const now = Date.now();
  const state = (n) => {
    const arw = byFile.get(n.file);             // whoever is on this file, if anyone still is
    const age = now - (n.seen || n.ts);         // since it reached this page
    const drawn = now - (n.born || n.ts);       // since the stroke: decides the drawing on
    return {
      n, age, arw,
      // the specks an edit throws off are an arrival, like the stroke itself —
      // timed from ev.ts they never played for anything that reached the page
      // more than a second after it happened
      editing: n.op === 'edit' && age < SPLAT_MS,
      prog: REDUCED ? 1 : Math.min(1, drawn / DRAW_MS),
      k: rubK(n),
      col: opInk(n.op),
      seed: (what) => hash(n.id + what),        // steady for this mark
      // the arrow speaks for the newest agent on the file, in that agent's
      // colour, which is not necessarily what the mark last recorded
      acol: arw ? opInk(arw.op) : opInk(n.op),
      word: arw ? opWord(arw.op) : '',
      code: arw ? label(arw) : null,
    };
  };

  // the highlighter, and the specks an edit throws off it
  const paint = (s) => {
    const { n, col, prog, age, seed, editing } = s;
    const r = G.tm.get(n.file);
    if (tc && r){
      markerEdge(tc, { x: r.x+3, y: r.y+3, w: r.w-6, h: r.h-6 }, seed('tm'), prog, col);
      if (editing) splat(tc, r.x + r.w - 12, r.y + 14, seed('tm'), age/SPLAT_MS, col);
    }
    const fr = G.fog.get(n.file);
    if (fc && fr){
      marker(fc, fr, seed('fog'), prog, col);
      if (editing) splat(fc, fr.x + fr.w, fr.y, seed('fog'), age/SPLAT_MS, col);
    }
    // timeline: mark the whole row, since that is the line being read
    const rr = G.rows.get(n.file);
    if (rc && rr){
      marker(rc, rr, seed('row'), prog, col);
      if (editing) splat(rc, rr.x + rr.w - 26, rr.y + rr.h/2, seed('row'), age/SPLAT_MS, col);
    }
  };

  // the arrow and its label, and where they landed
  const point = (s) => {
    const { n, arw, acol, word, code, seed } = s;
    if (!arw) return null;
    const r = G.tm.get(n.file), fr = G.fog.get(n.file);
    return {
      // the tag rides with the arrow: "reading! 838 lines" is one sentence, and
      // when the arrow moves to another file the sentence goes with it rather
      // than leaving its second half stranded on a mark nothing is pointing at
      tm: tc && r ? pointAt(tc, r, G.tw, seed('tma'), 1, n, acol, word, code, arw.band) : null,
      fog: fc && fr ? pointAt(fc, fr, G.fw, seed('foga'), 1, n, acol, word, code, arw.band) : null,
    };
  };

  const erase = (s, at) => {
    const { n, k, seed } = s;
    const r = G.tm.get(n.file);
    if (tc && r) rubOut(tc, union(markBox(r), at && at.tm), seed('tm'), k);
    const fr = G.fog.get(n.file);
    if (fc && fr) rubOut(fc, union(markBox(fr), at && at.fog), seed('fog'), k);
    const rr = G.rows.get(n.file);
    if (rc && rr) rubOut(rc, { x: rr.x, y: rr.y-3, w: rr.w, h: rr.h+6 }, seed('row'), k);
  };

  // Three passes, because a canvas has no layers and everything here is one.
  //
  // A rubber lifts whatever is already on the canvas inside its box, not only
  // the mark it belongs to, so a mark halfway through its erase used to reach
  // over neighbours drawn a moment earlier and take their ink with it — the next
  // frame put them back, which is what read as marks flickering out and
  // half-returning. And an arrow drawn during its own mark's turn was painted
  // over by the highlighter of every mark that came after it, so under a fan-out
  // the arrows sat behind the marks.
  //
  // So: the ones on their way out go first, complete, and are gone before
  // anything else is laid down. Then every highlighter. Then every arrow, on top
  // of all of them.
  const marks = live.map(state);
  for (const s of marks) if (s.k > 0){ paint(s); erase(s, point(s)); }
  for (const s of marks) if (s.k <= 0) paint(s);
  for (const s of marks) if (s.k <= 0) point(s);
}

// The loop only runs while something is live — an idle page draws nothing.
let boilT = null;
function kickBoil(){
  drawLive();
  if (REDUCED || boilT || nowLeft() <= 0) return;
  boilT = setInterval(() => {
    drawLive();
    if (nowLeft() <= 0){ clearInterval(boilT); boilT = null; }
  }, 50);      // frame step: fast enough for the rubber to move
}

const K = 3;
function fogTree(){
  // universe dirs + any dirs touched outside the universe (absolute paths, web, etc.)
  const base = UNIVERSE ? UNIVERSE.tree : [];
  const known = new Set(base.map(([d])=>d));
  const extra = new Map();
  for (const [p] of S.files){
    const d = dirOf(p);
    if (known.has(d)) continue;
    if (!extra.has(d)) extra.set(d, []);
    extra.get(d).push(p.split('/').pop());
  }
  // Sorted as one list, because the labels below only print what changed from the
  // row above — which is only readable if siblings actually sit next to each other.
  // Sorted on what a row will actually show, not on the raw path: with the work
  // above the recorded directory those are absolute, and sorting them raw would
  // file lib/ and public/ apart from everything they belong with.
  const key = (d) => d.startsWith('(') ? '￿' + d : stripRoot(d);
  return base.concat([...extra.entries()])
    .sort((a, b) => key(a[0]).localeCompare(key(b[0])));
}
function updateFog(){
  dropGeom();                          // the boxes the live layer measures are about to be replaced
  const box = $('fogMap');
  const nowIx = Math.floor(Date.now()/BUCKET);
  const tree = fogTree();
  // A grep can take a whole folder (its key is a directory) or the whole project
  // (key '(project)') instead of a file. Those have no cell to land on, so the
  // footprints dropped them while the treemap showed them. Route the folder ones
  // to their row's own label and the project-wide one to the coverage line, and
  // keep them out of the per-file hits so they raise no phantom cell.
  const dirSet = new Set(tree.map(([d]) => d));
  const searchedDirs = new Map();     // dir path -> its grep entry: the folder itself was searched
  let projSearch = null;              // a project-wide grep, no path
  const hitsByDir = new Map();
  for (const [p,fs] of S.files){
    if (dirSet.has(p)){ searchedDirs.set(p, fs); continue; }
    if (p === '(project)'){ projSearch = fs; continue; }
    const d = dirOf(p);
    if (!hitsByDir.has(d)) hitsByDir.set(d, []);
    hitsByDir.get(d).push([p,fs]);
  }
  let maxD = 2;
  for (const [,fs] of S.files){ const v = heatScore(fs,nowIx); if (v>maxD) maxD = v; }

  const frag = document.createDocumentFragment();
  let quietFiles = 0, quietDirs = [];
  const flushQuiet = ()=>{
    if (!quietFiles) return;
    const gap = document.createElement('span');
    gap.className = 'gap';
    // log, because these run from one folder to eight hundred and a linear rule
    // would make everything below a hundred look identical
    const span = Math.min(100, 10 + 24 * Math.log10(1 + quietFiles));
    const rule = document.createElement('i');
    rule.style.width = span.toFixed(1) + '%';
    rule.style.opacity = (0.3 + span / 320).toFixed(2);
    gap.appendChild(rule);
    gap.dataset.tip = tipBox(t('quietBandTitle'),
      [[t('lblFiles'), quietFiles.toLocaleString()], [t('lblUnexplored'), String(quietDirs.length)]],
      {note: quietDirs.slice(0,6).join(', ') + (quietDirs.length>6?', …':'')});
    frag.appendChild(gap);
    quietFiles = 0; quietDirs = [];
  };

  // Anything Claude touched outside the project has no prefix in common with the
  // rest and no useful place in the tree, so it folds into one line of its own.
  let outFiles = 0, outDirs = [];
  const flushOutside = ()=>{
    if (!outFiles) return;
    const band = document.createElement('span');
    band.className = 'band wide';
    band.textContent = t('outsideBand', {n: outFiles.toLocaleString(), m: outDirs.length});
    band.dataset.tip = tipBox(t('outsideBandTitle'),
      [[t('lblFiles'), outFiles.toLocaleString()], [t('lblFolders'), String(outDirs.length)]],
      {note: outDirs.slice(0,6).join(', ') + (outDirs.length>6?', …':'')});
    frag.appendChild(band);
    outFiles = 0; outDirs = [];
  };

  // The row above already showed the leading part of this path, so print only
  // what changed and let the indent carry the rest. No ellipsis, and no two rows
  // can read the same, which is what deep trees used to do to this panel.
  let shown = [], shownAbs = false;
  const carry = (dir) => {
    const abs = dir.startsWith('/');
    const seg = dir.split('/').filter(Boolean);
    let i = 0;
    // an absolute path carries nothing over from a relative one, whatever the
    // segments happen to look like
    if (abs === shownAbs)
      while (i < shown.length && i < seg.length && shown[i] === seg[i]) i++;
    shown = seg; shownAbs = abs;
    // splitting drops the leading separator, and putting it back is the
    // difference between /home/me/x and something that looks relative
    return { indent: i, text: (abs && !i ? '/' : '') + seg.slice(i).join('/') };
  };

  // Outside means "absolute, and not under the prefix the work shares" — not
  // merely "absolute". Claude Code records the directory it started in, and work
  // above that stays absolute: started in a repo's bin/, the whole of lib/,
  // public/ and test/ is absolute and is the project. Folding on the path shape
  // alone hid all of it. With no shared prefix to judge against, nothing folds.
  const away = (d) => !!ROOT && d.startsWith('/') && !d.startsWith(ROOT + '/') && d !== ROOT;
  const awayRows = tree.filter(([d]) => away(d) && (hitsByDir.get(d) || []).length).length;
  const touchedRows = tree.filter(([d]) => (hitsByDir.get(d) || []).length).length;
  // and never fold away most of what there is to look at
  const folding = awayRows > 0 && awayRows <= touchedRows * 0.4;

  for (const [dir, names] of tree){
    const hits = hitsByDir.get(dir) || [];
    const dsearched = searchedDirs.has(dir);          // the folder itself was grep'd
    if (folding && away(dir) && !dsearched){
      if (hits.length){ outFiles += hits.length; outDirs.push(dir+'/'); }
      else { quietFiles += names.length; quietDirs.push(dir+'/'); }
      continue;
    }
    if (!hits.length && !dsearched){ quietFiles += names.length; quietDirs.push(dir+'/'); continue; }
    flushQuiet();
    const named = names.slice().sort();
    const len = named.length;
    const hitIx = new Map();
    for (const [p,fs] of hits){
      const ix = named.indexOf(p.split('/').pop());
      if (ix>=0) hitIx.set(ix, [p,fs]);
    }
    const revealed = new Set();
    for (const ix of hitIx.keys())
      for (let j=Math.max(0,ix-K); j<=Math.min(len-1,ix+K); j++) revealed.add(j);

    const row = document.createElement('div');
    row.className = 'fgrow';
    const lab = document.createElement('span');
    lab.className = 'ilab' + (dsearched ? ' searched' : '');
    if (dir.startsWith('(')){
      lab.textContent = dir;
      shown = [];                                // a bucket breaks the run
    } else {
      const c = carry(stripRoot(dir));
      lab.style.setProperty('--depth', String(Math.min(c.indent, 6)));
      lab.textContent = (c.text || './') + '/';
    }
    // a footprint on the folder itself: the grep marker leads its label
    if (dsearched) lab.insertAdjacentHTML('afterbegin', '<span class="fsic" aria-hidden="true">⌕</span>');
    lab.dataset.tip = tipBox(dir+'/', [[t('lblFiles'), String(len)],
      [t('lblTouched'), String(hits.length)], [t('lblHits'), String(hits.reduce((a,[,f])=>a+f.total,0))]],
      {note: t('openTip'), flag: dsearched ? t('dirSearched') : null});
    if (!dir.startsWith('(')){
      lab.classList.add('openable');
      lab.addEventListener('click', (e)=> openTarget(dir, e));
    }
    const cells = document.createElement('span');
    cells.className = 'fgcells';
    row.append(lab, cells);
    let i = 0;
    while (i < len){
      if (!revealed.has(i)){
        let j = i; while (j<len && !revealed.has(j)) j++;
        cells.appendChild(bandEl(j-i, tipBox(dir+'/', [[t('lblUnexplored'), String(j-i)]])));
        i = j; continue;
      }
      const nm = named[i];
      const path = dir==='(root)' || dir.startsWith('(') ? nm : dir+'/'+nm;
      const hit = hitIx.get(i);
      const el = cellEl(tipBox(path, [[t('lblStatus'), t('sUntouched')]]), hash(path));
      if (hit){
        const [p,fs] = hit;
        const sc = heatScore(fs, nowIx);
        const a = Math.round((0.14 + 0.72*Math.sqrt(sc/maxD))*100);
        el.classList.remove('un');
        el.style.background = hatch(a, hash(p));
        el.style.borderColor = fs.reads>=4 ? PAL.del : opCol(domOp(fs.ops));
        if (sc/maxD > 0.5) el.style.boxShadow = `0 0 10px color-mix(in srgb, ${PAL.heat} 55%, transparent)`;
        el.dataset.tip = fileTip(p, fs, true);
        el.dataset.path = p;                 // drawLive matches its marks to cells by this
        el.classList.add('openable');
        // A cell wears the quiet ring for as long as it has been touched
        // lately, live or not. There used to be a .now class here that
        // suppressed it, kept in step by a sweep on its own timer — which meant
        // a cell that had just stopped being live wore no ring at all until the
        // next render, and one that went live between renders wore the ring and
        // a crayon mark at once. The mark is drawn from S.live, which is the
        // only thing that actually knows; a second copy of that answer in the
        // DOM was one too many.
        if (isWarm(fs)) el.classList.add('warm');
        if (fs.gone) el.classList.add('gone');
        if (fs.errs) el.classList.add('err');
        el.addEventListener('click', (e)=> openTarget(p, e));
        if (fs.ops.edit>0) el.innerHTML = '<span class="em">✎</span>';
      }
      cells.appendChild(el);
      i++;
    }
    frag.appendChild(row);
  }
  flushQuiet();
  flushOutside();
  box.replaceChildren(frag);
  const total = UNIVERSE ? UNIVERSE.total : 0;
  const inU = UNIVERSE ? [...S.files.keys()].filter(p=>UNIVERSE.set.has(p)).length : S.files.size;
  // A session can be recorded against one folder and spend itself in another —
  // told to move to a worktree, or writing somewhere that belongs to no
  // repository at all. Then almost nothing it touched is in this file list and
  // the percentage says 0%, which reads as "it looked at nothing" rather than
  // "it was looking somewhere else". Say the second thing; the header above
  // already names where.
  const touched = S.files.size;
  const strayed = touched >= 4 && inU / touched < 0.3;
  // A truncated file list makes the denominator arbitrary, so the percentage
  // would be a confident lie — show the count and say what it is counting.
  // The count wears the crayon; the reason stands next to it in the hint's own
  // small type. Both used to go inside the mark together, which put a sentence
  // in a highlighter meant for a number and then broke the highlighter across
  // the line when it wrapped.
  $('cov').textContent = !total ? ''
    : (strayed || UNIVERSE.truncated) ? t('coverageNum', {a:inU, b:total})
    : t('coverage', {a:inU, b:total, p:Math.round(inU/total*100)});
  const why = !total ? ''
    : strayed ? t('coverageElsewhere', {n:touched - inU})
    : UNIVERSE.truncated ? t('coverageCapped', {b:total, n:UNIVERSE.listed})
    : '';
  $('covNote').textContent = why ? ' · ' + why : '';
  // a project-wide grep has no folder to sit in — it says so beside the count
  const cs = $('covSearch');
  if (projSearch){
    cs.innerHTML = ' · <span class="fsic" aria-hidden="true">⌕</span>' + projSearch.total;
    cs.dataset.tip = tipBox('(project)', [[t('lblHits'), String(projSearch.total)]], {note: t('projSearchedNote')});
  } else { cs.textContent = ''; delete cs.dataset.tip; }
}

/* ══ treemap — crayon ══ */
const tm = $('tm'), tmx = tm.getContext('2d');
let TM_RECTS = [];
function wavyLine(c, x1, y1, x2, y2, rnd, wob){
  const dx = x2-x1, dy = y2-y1, len = Math.hypot(dx,dy) || 1;
  const nx = -dy/len, ny = dx/len;
  const n = Math.max(2, Math.round(len/7));
  const o = () => (rnd()-0.5)*wob;
  c.moveTo(x1 + o() - dx/len*1.5, y1 + o() - dy/len*1.5);   // 모서리 삐침
  for (let i=1;i<=n;i++){
    const t2 = i/n, j = (rnd()-0.5)*wob;
    c.lineTo(x1+dx*t2+nx*j + (i===n ? dx/len*1.5 : 0), y1+dy*t2+ny*j + (i===n ? dy/len*1.5 : 0));
  }
}
function crayonRect(c, r, col, lw, seed){
  // 네 변을 각각 지터 폴리라인으로 — 모서리가 어긋나며 손그림 느낌
  const rnd = mulberry(seed ?? hash((r.x|0)+':'+(r.y|0)));
  const wob = Math.min(2.6, 1.2 + lw*0.5);
  c.strokeStyle = col; c.lineWidth = lw;
  c.lineJoin = 'round'; c.lineCap = 'round';
  const x1=r.x+1, y1=r.y+1, x2=r.x+r.w-1, y2=r.y+r.h-1;
  for (let k=0;k<2;k++){
    c.beginPath();
    wavyLine(c, x1, y1, x2, y1, rnd, wob);
    wavyLine(c, x2, y1, x2, y2, rnd, wob);
    wavyLine(c, x2, y2, x1, y2, rnd, wob);
    wavyLine(c, x1, y2, x1, y1, rnd, wob);
    c.stroke();
  }
}
// crayon shading: soft base + wide diagonal strokes, direction seeded per cell
function crayonFill(c, x, y, w, h, alpha, seed){
  const rnd = mulberry(seed);
  c.save();
  c.beginPath(); c.rect(x, y, w, h); c.clip();
  c.fillStyle = PAL.heat;
  c.globalAlpha = alpha*0.45;
  c.fillRect(x, y, w, h);
  c.globalAlpha = alpha*0.55;
  c.strokeStyle = PAL.heat;
  c.lineWidth = 3;
  c.beginPath();
  const slant = 0.7 + rnd()*0.6;
  for (let sx = x - h*slant; sx < x + w; sx += 5.5){
    const j = (rnd()-0.5)*2.2;
    c.moveTo(sx + j, y + h + 1);
    c.lineTo(sx + h*slant + j, y - 1);
  }
  c.stroke();
  c.restore();
  c.globalAlpha = 1;
}
function drawTM(){
  dropGeom();                          // TM_RECTS is about to be rebuilt
  const rct = tm.getBoundingClientRect();
  if (!rct.width || !S) return;
  const DPR = Math.min(devicePixelRatio||1, 2);
  const W = rct.width, H = 320;
  tm.width = W*DPR; tm.height = H*DPR;
  tmx.setTransform(DPR,0,0,DPR,0,0);
  tmx.clearRect(0,0,W,H);
  const nowIx = Math.floor(Date.now()/BUCKET);
  const FACE = css().getPropertyValue('--hand').trim() || 'cursive';
  const FONT = '700 15px '+FACE;
  const fit = (txt, maxW, weight) => {     // shrink to fit, then ellipsize keeping the extension
    for (const sz of [15, 13.5, 12, 10.5]){

      if (tmx.measureText(txt).width <= maxW) return txt;
    }
    const m = txt.match(/^(.*?)(\.[A-Za-z0-9]{1,6})$/);

    return base+'…'+ext;
  };
  const plate = (txt, x, y, fg) => {       // paper plate keeps text readable over crayon

    tmx.globalAlpha = 1; tmx.fillStyle = fg;
    tmx.fillText(txt, x, y);
  };
  TM_RECTS = [];
  let maxD = 2;
  for (const [,fs] of S.files){ const v = heatScore(fs,nowIx); if (v>maxD) maxD = v; }

  const byDir = new Map();
  for (const [p,fs] of S.files){
    const d = dirOf(p);

  }
  const dirTotals = new Map((UNIVERSE?UNIVERSE.tree:[]).map(([d,ns])=>[d,ns.length]));
  const dirs = [...byDir.values()].map(d=>({...d, wt:d.hits})).sort((a,b)=>b.wt-a.wt);
  if (!dirs.length){

    tmx.fillText(t('noActivity'), W/2, H/2);

  }

  for (const d of dirs){
    const r = d.rect;

    const totalF = dirTotals.get(d.dir) || d.files.length;
    crayonRect(tmx, r, isWastePath(d.dir+'/') ? PAL.warn : PAL.ink3, 2.7, hash(d.dir)); // 폴더 외곽 = 굵은 크레용
    const showLab = r.w > 78 && r.h > 34;
    if (showLab){
      tmx.font = FONT;
      tmx.textAlign = 'left';
      tmx.save();
      tmx.beginPath(); tmx.rect(r.x+2, r.y, r.w-4, r.h); tmx.clip();
      const dl = (d.dir.startsWith('(')?d.dir:dirLabel(d.dir,2)+(d.dir===ROOT?'':'/'))
        + ` ${d.files.length}/${totalF} · ${d.hits}h`;
      plate(fit(dl, r.w-14, 700), r.x+7, r.y+17, isWastePath(d.dir+'/') ? PAL.warn : PAL.ink2);
      tmx.restore();
    }
    TM_RECTS.push({...r, dir:d.dir, agg:true, count:totalF, hits:d.hits, touched:d.files});
    const padT = showLab ? 23 : 4, pad = 4;
    const ix0 = r.x+pad, iy0 = r.y+padT, iw = r.w-pad*2, ih = r.h-padT-pad;
    if (iw < 10 || ih < 10) continue;
    const items = d.files.map(f=>({...f, wt: Math.max(1, f.fs.total)})).sort((a,b)=>b.wt-a.wt);
    squarify(items, ix0, iy0, iw, ih);
    for (const it of items){
      const c = it.rect;
      if (!c || c.w<4 || c.h<4) continue;
      const cell = {x:c.x+1, y:c.y+1, w:c.w-2, h:c.h-2};
      const fs = it.fs;
      const sc = heatScore(fs, nowIx);
      const rel = sc/maxD;
      const rnd = mulberry(hash(it.path));
      tmx.save();
      tmx.translate(cell.x+cell.w/2, cell.y+cell.h/2);
      tmx.rotate((rnd()-0.5)*0.05);
      crayonFill(tmx, -cell.w/2+2, -cell.h/2+2, cell.w-4, cell.h-4,
        0.14 + 0.72*Math.sqrt(rel), hash(it.path)+3);
      if (rel > 0.6 && cell.w > 14){       // extra scribble on the hottest cells
        tmx.globalAlpha = 0.45;
        tmx.strokeStyle = PAL.heat; tmx.lineWidth = 1.2;
        tmx.beginPath();
        for (let sx=-cell.w/2+4; sx<cell.w/2-4; sx+=5)
          { tmx.moveTo(sx+rnd()*2, -cell.h/2+3); tmx.lineTo(sx+3+rnd()*2, cell.h/2-3); }
        tmx.stroke();
      }
      tmx.restore();
      tmx.globalAlpha = 1;
      crayonRect(tmx, cell, fs.reads>=4 ? PAL.del : opCol(domOp(fs.ops)), 1.4, hash(it.path)+7);
      if (cell.w > 40 && cell.h > 19){
        tmx.textAlign='left';
        tmx.save();
        tmx.beginPath(); tmx.rect(cell.x+1, cell.y, cell.w-2, cell.h); tmx.clip();
        plate(fit((fs.gone?'✕ ':'') + (fs.ops.edit>0?'✎ ':'') + it.path.split('/').pop(), cell.w-12, 600),
          cell.x+5, cell.y+16, PAL.ink);
        // second line only when the rectangle can hold it
        if ((fs.plus || fs.minus) && cell.h > 36 && cell.w > 58){
          tmx.font = '700 13px '+FACE;
          const parts = [];
          if (fs.plus) parts.push(['+'+fs.plus, PAL.good]);
          if (fs.minus) parts.push(['−'+fs.minus, PAL.del]);
          let x = cell.x+5;
          const wAll = parts.reduce((a,[txt])=>a+tmx.measureText(txt).width+6, 0);
          if (wAll <= cell.w-10){
            tmx.globalAlpha = .8; tmx.fillStyle = PAL.paper;
            tmx.fillRect(cell.x+2, cell.y+19, wAll+4, 15);
            tmx.globalAlpha = 1;
            for (const [txt, col] of parts){
              tmx.fillStyle = col;
              tmx.fillText(txt, x, cell.y+31);
              x += tmx.measureText(txt).width + 6;
            }
          }
        }
        tmx.restore();
      }
      TM_RECTS.push({...cell, path:it.path, fs, dir:d.dir});
    }
  }
}
tm.addEventListener('mousemove', e=>{

        [t('lblTouched'), `${tc.length} / ${hit.count}`]],
        {note: tc.slice(0,4).map(f=>f.path.split('/').pop()).join(', ')+(tc.length>4?', …':''),

    if (mx>=r.x && mx<=r.x+r.w && my>=r.y && my<=r.y+r.h && !r.agg){ hit = r; break; }
  if (!hit) for (const r of TM_RECTS)

/* ══ temporal strips ══ */
const rowEls = new Map();
let heatMax = 3;
const RANGES = [['5m', 5*60e3], ['1h', 60*60e3], ['all', 0]];
let heatRange = (()=>{ try{ return localStorage.getItem('cs-range') || '5m'; }catch(e){ return '5m'; } })();
function heatWindow(){
  const now = Date.now();
  const r = RANGES.find(x=>x[0]===heatRange) || RANGES[0];
  const start = r[1] ? now - r[1] : (S.firstTs || now - 5*60e3);
  return {start, now, col: Math.max(1000, (now - start)/COLS)};
}
function binHits(fs, win){                 // hb is keyed by 10s bucket; fold into columns
  const cols = new Array(COLS).fill(0);
  for (const k in fs.hb){
    const ts = Number(k)*BUCKET;
    if (ts < win.start || ts > win.now) continue;
    const i = Math.min(COLS-1, Math.floor((ts - win.start)/win.col));
    cols[i] += fs.hb[k];
  }
  return cols;
}
// The same fold, but keeping what kind of work each column was mostly made of.
// An edit outranks a read in the same column: it is the rarer and the louder
// thing to have happened there.
const OP_RANK = {edit:4, del:4, bash:3, grep:2, read:1};
// One square can stand for more than one kind of work — measured on real
// sessions it is 0% of squares at the default 5m range and 2–24% at the wider
// ones, and it was never more than two kinds. So: the louder one takes the
// square, the other takes a band along the bottom. Two colours is the whole
// range of the problem, and stacking bars into an 8px box would not be read.
const rankOps = (ops) => Object.keys(ops).sort((a,b) => (OP_RANK[b]||0) - (OP_RANK[a]||0));
// Everything a single square stands for, so hovering one can say it. Folded the
// same way the drawing is, from the same buckets, so the tooltip and the picture
// can never drift apart.
function binDetail(fs, win){
  const cols = new Array(COLS).fill(null);
  const into = (k, add) => {
    const ts = Number(k)*BUCKET;
    if (ts < win.start || ts > win.now) return;
    const i = Math.min(COLS-1, Math.floor((ts - win.start)/win.col));
    const c = cols[i] || (cols[i] = {n:0, ops:{}, plus:0, minus:0, from:ts, to:ts});
    c.from = Math.min(c.from, ts); c.to = Math.max(c.to, ts);
    add(c);
  };
  for (const k in fs.hbo) into(k, c => {
    for (const op in fs.hbo[k]){ c.ops[op] = (c.ops[op]||0) + fs.hbo[k][op]; c.n += fs.hbo[k][op]; }
  });
  for (const k in fs.hbd) into(k, c => {
    c.plus += fs.hbd[k].plus; c.minus += fs.hbd[k].minus;
  });
  return cols;
}
function stripTip(path, c){
  const rows = [[t('lblHits'), String(c.n)]];

  if (c.ops.grep) rows.push([t('lblSearch'), String(c.ops.grep)]);
  if (c.ops.edit) rows.push([t('lblEdit'), String(c.ops.edit)]);
  if (c.plus) rows.push([t('lblAdded'), '+'+c.plus]);
  if (c.minus) rows.push([t('lblRemoved'), '−'+c.minus]);

function renderRanges(){

    const b = document.createElement('button');
    b.type = 'button';
    b.className = heatRange===key ? 'on' : '';

    b.addEventListener('click', ()=>{

function drawStrip(path, win){
  const r = rowEls.get(path); if (!r) return;
  const fs = S.files.get(path); if (!fs) return;
  win = win || heatWindow();
  const cv = r.cv, ctx = cv.getContext('2d');

  // one fold, used for the picture and for what hovering a square says, so the
  // two cannot drift apart

  for (let i=0;i<COLS;i++){
    const c = det[i];

    if (!n) continue;
    const t2 = Math.min(1, Math.sqrt(n/heatMax));
    const rnd = mulberry(hash(path) + i);
    // the colour says what happened here, the depth says how much of it — which
    // is what the legend above the panel has always claimed

    const col = kinds.length ? opCol(kinds[0]) : PAL.heat;
    ctx.save();
    ctx.translate(i*cw + cw/2, h/2);
    ctx.rotate((rnd()-0.5)*0.16);

    ctx.globalAlpha = 0.22 + t2*0.42;

// The session on screen carries a live turn signal off the event stream: the

// which reads the same turn state from the file's tail on the /sessions poll.
function isLive(sess){
  if (S && S.id === sess.id && S.ready){

// folds itself; a fold or an unfold is remembered and wins from then on.
const FOLD_OVER = 6;

  return v === '1' ? true : v === '0' ? false : null; }catch(e){ return null; } })();

// otherwise the first thing it did, which is close and is all there is —
// measured across every session on this machine, 69% of subagents record no link
// back to their Task call at all. Infinity means neither is known, which is a
// subagent that has only just appeared.
const startOf = ([nm, a]) => (a.task && a.task.start) || a.firstTs || Infinity;

// under that string, so two agents can never share one and it can never change.
// What it is *called on screen* is another matter. The suffix it carries is the
// count of transcripts seen when its file was first opened — the order the
// directory happened to list them in — so "implementer #22" means the
// twenty-second file, not the twenty-second implementer, and across a real
// session those numbers rose with time in only 8 of 21 steps.
//
// Numbered here instead, per role and in the order they actually ran. A role
// with only one agent keeps its plain name.
let AGENT_NAME = new Map(), AGENT_CODE = new Map();

// "general-purpose" is "gp". Anything that is not part of a word is dropped
// rather than carried through: splitting a raw, un-renamed label produced
// codes like "ws#", because the " #10" the transcript layer appends counts as a
// word beginning with a hash.
const initialsOf = (role) => {

  return (w.map(x => x[0]).join('') || String(role)).slice(0, 3).toLowerCase();
};
function nameAgents(){
  const byRole = new Map();

    if (entry[0] === 'main') continue;
    const r = roleOf(entry[0]);
    if (!byRole.has(r)) byRole.set(r, []);
    byRole.get(r).push(entry);
  }
  AGENT_NAME = new Map(); AGENT_CODE = new Map();
  // Initials are lossy, so two roles can want the same ones — "git-pusher" and
  // "general-purpose" are both "gp". A key that names two different things is
  // worse than a longer key, so the loser takes more of its first word until it
  // is nobody else's. Sorted, so which one is the loser does not depend on the
  // order the transcripts happened to be read in.

  for (const r of [...byRole.keys()].sort()){
    let s = initialsOf(r);
    if (taken.has(s)){
      const base = (String(r).split(/[^A-Za-z0-9]+/)[0] || String(r)).toLowerCase();
      let n = 2;
      while (n < base.length && taken.has(base.slice(0, n))) n++;
      s = base.slice(0, n);
      for (let k = 2; taken.has(s); k++) s = base.slice(0, n) + k;
    }
    taken.add(s); short.set(r, s);
  }

    const s = short.get(r);
    if (list.length === 1){

      continue;
    }
    list.sort((x, y) => {
      const d = startOf(x) - startOf(y);
      return (Number.isNaN(d) ? 0 : d) || x[0].localeCompare(y[0]);
    });
    list.forEach((e, i) => {

  $('statline').innerHTML = t('statline', {ops, files:S.files.size, rr:rrHtml,
    err: errs ? t('errChip',{n:errs}) : ''});
  // cached input is ~10× cheaper than fresh input, so never show them as one number
  const cache = cw + cr, all = fresh + cache;
  const cost = usd ? t('costEst',{v:fmtUsd(usd)})
    : (unpriced.size ? t('costUnknown',{m:[...unpriced].join(', ')}) : '');
  $('costline').innerHTML = t('costline', {
    fresh: fmtTok(fresh), cache: fmtTok(cache),
    hit: all ? Math.round(cache/all*100) : 0, tout: fmtTok(tout), cost});
  $('costline').dataset.tip = tipBox(t('costTip'),
    [['fresh', fmtTok(fresh)], ['cache write', fmtTok(cw)], ['cache read', fmtTok(cr)],
     ['out', fmtTok(tout)], ...(usd ? [['≈', fmtUsd(usd)]] : [])],
    {note: t('costTipNote')});
}
function renderTicker(ev){
  const el = $('ticker');
  el.innerHTML = `${new Date(ev.ts).toTimeString().slice(0,8)} · ${esc(ev.agent)} · `
    + `<span class="op" style="color:${opCol(ev.op)}">${(OP_LABEL[ev.op]||ev.op).toLowerCase()}</span> · ${esc(ev.file)}`;
  el.classList.remove('blink'); void el.offsetWidth; el.classList.add('blink');
}
function renderNotes(){
  const out = [];
  const files = [...S.files.entries()];
  // A note names a file, so the name should behave like the file does everywhere
  // else on the page: its own tooltip, and a click that offers to open it. The
  // tooltip is attached afterwards rather than written into the markup — fileTip
  // returns HTML, and esc() is for text, not for the inside of an attribute.
  const refs = new Map();
  const attr = (s) => esc(s).replace(/"/g, '&quot;');
  const fref = (p, s) => {
    refs.set(p, s);
    return `<span class="fref openable" data-path="${attr(p)}">${esc(p.split('/').pop())}</span>`;
  };

  const rr = files.filter(([,s])=>s.reads>=4).sort((a,b)=>b[1].reads-a[1].reads);
  for (const [p,s] of rr.slice(0,2)){
    out.push({lv: s.reads>=7?'bad':'warn',
      t: t('nRereadT', {f: fref(p, s), n: s.reads}),
      why: t('nRereadW')});
  }
  const failing = files.filter(([,s])=>s.errs>=3).sort((a,b)=>b[1].errs-a[1].errs);
  for (const [p,s] of failing.slice(0,1))
    out.push({lv:'bad', t: t('nErrT',{f: fref(p, s), n:s.errs}), why: t('nErrW')});
  const totalErrs = [...S.agents.values()].reduce((a,x)=>a+x.errs,0);
  if (totalErrs >= 8 && !failing.length)
    out.push({lv:'warn', t: t('nErrAgentT',{n:totalErrs}), why: t('nErrAgentW')});
  const waste = files.filter(([p])=>isWastePath(p));
  const wCnt = waste.reduce((a,[,s])=>a+s.total,0);
  if (wCnt>=3) out.push({lv:'bad', t: t('nJunkT',{n:wCnt}), why: t('nJunkW')});
  const dup = files.filter(([,s])=>s.agents.size>=2 && s.total>=4);
  if (dup.length>=2) out.push({lv:'warn', t: t('nDupT',{n:dup.length}), why: t('nDupW')});
  if (files.some(([p])=>p.split('/').pop()==='CLAUDE.md')) out.push({lv:'good', t: t('nClaudeT'), why: t('nClaudeW')});
  if (S.opCount.edit>0 && S.opCount.bash>0) out.push({lv:'good', t: t('nLoopT'), why: t('nLoopW')});
  $('notes').innerHTML = out.slice(0,4).map(n=>`
    <div class="note ${n.lv}"><span class="ic">${n.lv==='good'?'✓':n.lv==='warn'?'!':'✗'}</span>
    <span>${n.t} <span class="why">— ${n.why}</span></span></div>`).join('');
  for (const el of $('notes').querySelectorAll('.fref[data-path]')){
    const s = refs.get(el.dataset.path);
    if (s) el.dataset.tip = fileTip(el.dataset.path, s, true);
  }
}
// The notes are rebuilt as markup, so the click lives on the container instead of
// on names that get replaced out from under it.
$('notes').addEventListener('click', (e)=>{
  const el = e.target.closest && e.target.closest('.fref[data-path]');
  if (el) openTarget(el.dataset.path, e);
});
function renderNoFiles(){
  const el = $('noFiles');
  const ops = Object.values(S.opCount).reduce((a,b)=>a+b,0);
  if (S.files.size === 0 && ops > 0){ el.innerHTML = t('noFilesYet', {n: ops}); el.hidden = false; }
  else el.hidden = true;
}
function renderAll(){
  lastRender = Date.now();
  ROOT = computeRoot([...S.files.keys()].map(dirOf));
  const rn = $('rootNote');
  if (ROOT){ rn.innerHTML = t('underRoot', {p: esc(ROOT)+'/'}); rn.hidden = false; }
  else rn.hidden = true;
  renderSessLinks(); renderAgents(); renderStats(); renderRows(); renderNotes();
  updateFog(); drawTM(); kickBoil(); renderNoFiles();
}

/* ══ foldable sections ══ */
function initFolds(){
  document.querySelectorAll('section').forEach((sec, i)=>{
    const h = sec.querySelector('h2');
    if (!h) return;
    const key = 'cs-sec-' + (sec.dataset.key || i);
    let folded = false;
    try{ folded = localStorage.getItem(key) === '1'; }catch(e){}
    sec.classList.toggle('folded', folded);
    h.tabIndex = 0;
    h.dataset.tip = tipBox(h.textContent.replace(/^[▾▸]\s*/,''), [], {note: t('secFold')});
    const toggle = ()=>{
      const now = !sec.classList.contains('folded');
      sec.classList.toggle('folded', now);
      try{ localStorage.setItem(key, now?'1':'0'); }catch(e){}
      if (!now && S && S.ready) renderAll();   // canvases need a redraw once visible again
    };
    h.addEventListener('click', toggle);
    h.addEventListener('keydown', e=>{ if (e.key==='Enter'||e.key===' '){ e.preventDefault(); toggle(); } });
  });
}

/* ══ language ══ */
function applyLang(){
  document.documentElement.lang = LANG;
  document.querySelectorAll('[data-i18n]').forEach(el=>{ el.textContent = t(el.dataset.i18n); });
  document.querySelectorAll('[data-i18n-html]').forEach(el=>{ el.innerHTML = t(el.dataset.i18nHtml); });
  renderLangs();
  paintThemeBtn();                // the mark's tooltip is worded too
  renderFogLegend();              // and the key beside the footprints
  $('btnPause').textContent = running ? t('pause') : t('resume');
  if (S && S.ready){ renderSessLinks(); renderAll(); if (S.lastEv) renderTicker(S.lastEv); }
  else renderSessLinks();
}
function renderLangs(){
  const box = $('langs');
  box.innerHTML = '';
  for (const code of LANGS){
    const b = document.createElement('button');
    b.type = 'button';
    b.className = code === LANG ? 'on' : '';
    b.textContent = I18N[code]._short || code.toUpperCase();
    b.lang = code;          // each label is written in its own language, so let it
    b.title = I18N[code]._name;   // pick up that language's face wherever it sits
    b.setAttribute('aria-pressed', String(code === LANG));
    b.addEventListener('click', ()=>{
      if (code === LANG) return;
      LANG = code;
      try{ localStorage.setItem('cs-lang', LANG); }catch(e){}
      applyLang();
    });
    box.appendChild(b);
  }
}
$('btnPause').addEventListener('click', function(){
  running = !running;
  this.textContent = running ? t('pause') : t('resume');
  this.classList.toggle('on', !running);
  this.setAttribute('aria-pressed', String(!running));
  if (running && liveBuf.length){
    for (const ev of liveBuf) applyEvent(ev, false);
    liveBuf = [];
    renderAll();
    if (S.lastEv) renderTicker(S.lastEv);
  }
});
$('btnTheme').addEventListener('click', cycleTheme);

/* periodic refresh: heat fade, delta expiry, session list */
setInterval(()=>{
  if (!S || !S.ready || !running) return;
  const now = Date.now();
  for (const s of S.files.values())
    if (s.delta>0 && now-s.deltaT > 15000) s.delta = 0;
  renderAll();
}, 3000);
setInterval(()=>{                       // let the live marks fade on their own when idle
  if (!S || !S.live) return;
  const now = Date.now();
  let dropped = false;
  for (const [file, n] of S.live)
    if (now >= dieAt(n)){ S.live.delete(file); dropped = true; }
  if (!dropped) return;
  // S.now is the newest of them, so it expires last: once it is gone nothing is live
  if (S.now && now >= dieAt(S.now)) S.now = null;
  drawLive();
}, 1000);
setInterval(loadSessions, 10000);   // keeps the live/done badges honest
// The file universe was read once at boot and then believed for the rest of the
// session. Claude Code commits, deletes and switches branches while you watch —
// git ls-files says something different afterwards, and coverage and the fog map
// were still answering from whatever was true when the page loaded.
setInterval(async ()=>{
  if (OFFLINE) return;
  await loadUniverse();
  if (S && S.ready) renderAll();
}, 60000);
addEventListener('resize', ()=>{ fitPad(); dropGeom(); if (S && S.ready) renderAll(); });

/* ══ boot ══ */
if (document.fonts && document.fonts.ready)
  document.fonts.ready.then(()=>{ if (S && S.ready) renderAll(); });
applyLang();
initFolds();
(async () => {
  await loadMeta();          // resolves which folder we're on before anything asks
  await loadUniverse();
  await loadSessions();
})();
})();
</script>
</body>
